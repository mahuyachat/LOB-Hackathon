                            {activeModel.badge && <span className="model-badge">{activeModel.badge}</span>}
                          </div>
                          {activeModel.whenToUse && <div style={{ display: "flex", alignItems: "flex-start", gap: "var(--space-2)", marginBottom: "var(--space-2)" }}><svg viewBox="0 0 14 14" width="13" height="13" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" style={{ flexShrink: 0, marginTop: 2, color: "var(--color-fg-action)" }}><circle cx="7" cy="7" r="6"/><path d="M7 4.5v3l1.8 1.2"/></svg><div><span style={{ font: "500 11px/15px var(--font-sans)", color: "var(--color-fg-secondary)", textTransform: "uppercase", letterSpacing: "0.05em" }}>When to use  </span><span style={{ font: "400 12px/18px var(--font-sans)", color: "var(--color-fg-secondary)" }}>{activeModel.whenToUse}</span></div></div>}
                          {activeModel.industry && <div style={{ display: "flex", alignItems: "flex-start", gap: "var(--space-2)" }}><svg viewBox="0 0 14 14" width="13" height="13" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0, marginTop: 2, color: "var(--color-fg-action)" }}><rect x="1" y="6" width="12" height="7" rx="1"/><path d="M5 6V4.5a2.5 2.5 0 0 1 5 0V6"/></svg><div><span style={{ font: "500 11px/15px var(--font-sans)", color: "var(--color-fg-secondary)", textTransform: "uppercase", letterSpacing: "0.05em" }}>Industry  </span><span style={{ font: "400 12px/18px var(--font-sans)", color: "var(--color-fg-secondary)" }}>{activeModel.industry}</span></div></div>}
                        </div>
                        <div style={{ display: "flex", gap: "var(--space-2)", flexShrink: 0 }}>
                          <button className="btn btn-ghost btn-icon-only" title="Remove model" onClick={() => set("aiModelId", "")} style={{ color: "var(--color-fg-secondary)" }}>
                            <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg>
                          </button>
                          <button className="btn" onClick={() => setModelDrawerOpen(true)}>Change model</button>
                        </div>
                      </div>
                    </div>
                  );
                })()}
              </div>
              <div className="intel-sub-section">
                {(() => {
                  const activeSurvey = SURVEY_DESIGNS.find(s => s.id === c.surveyDesignId);
                  if (!activeSurvey) return (
                    <header className="form-section-head no-border" style={{ cursor: "default" }}>
                      <span className="step-num" style={{ display: "flex", fontSize: 0 }}>
                        <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="1" width="12" height="14" rx="1.5"/><line x1="5" y1="5" x2="11" y2="5"/><line x1="5" y1="8" x2="11" y2="8"/><line x1="5" y1="11" x2="9" y2="11"/></svg>
                      </span>
                      <div style={{ flex: 1 }}><h3>Survey Template</h3><div className="sub">Pick the survey design that will be sent to customers</div></div>
                      <button className="btn" onClick={() => setSurveyDrawerOpen(true)}>Choose Survey Template →</button>
                    </header>
                  );
                  return (
                    <div className="selected-model-summary">
                      <div className="selected-model-summary-inner">
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: "var(--space-2)", marginBottom: "var(--space-3)" }}>
                            <span style={{ font: "600 15px/22px var(--font-sans)", color: "var(--color-fg-default)", letterSpacing: "-0.01rem" }}>{activeSurvey.name}</span>
                            <span style={{ font: "400 12px/18px var(--font-sans)", color: "var(--color-fg-secondary)" }}>· {activeSurvey.category}</span>
                          </div>
                          {activeSurvey.why && <div style={{ display: "flex", alignItems: "flex-start", gap: "var(--space-2)" }}><svg viewBox="0 0 14 14" width="13" height="13" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" style={{ flexShrink: 0, marginTop: 2, color: "var(--color-fg-action)" }}><circle cx="7" cy="7" r="6"/><path d="M7 4.5v3l1.8 1.2"/></svg><div><span style={{ font: "500 11px/15px var(--font-sans)", color: "var(--color-fg-secondary)", textTransform: "uppercase", letterSpacing: "0.05em" }}>When to use  </span><span style={{ font: "400 12px/18px var(--font-sans)", color: "var(--color-fg-secondary)" }}>{activeSurvey.why}</span></div></div>}
                        </div>
                        <div style={{ display: "flex", gap: "var(--space-2)", flexShrink: 0 }}>
                          <button className="btn btn-ghost btn-icon-only" title="Remove survey" onClick={() => set("surveyDesignId", "")} style={{ color: "var(--color-fg-secondary)" }}>
                            <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg>
                          </button>
                          <button className="btn" onClick={() => setSurveyDrawerOpen(true)}>Change survey</button>
                        </div>
                      </div>
                    </div>
                  );
                })()}
              </div>
              </div>
            </div>
          )}

          {/* ── Step 4: Summary & Review ── */}
          {activeStep === 3 && (() => {
            const CHANNEL_LABEL = { digital: "Digital", voice: "Voice", email: "Email", sms: "SMS" };
            const aiModel = AI_MODELS?.find(m => m.id === c.aiModelId);
            const survey  = SURVEY_DESIGNS?.find(s => s.id === c.surveyDesignId);
            const SRSection = ({ title, num, children }) => (
              <div className="sr-section">
                <div className="sr-section-head">
                  <span className="sr-section-num">{num}</span>
                  <span className="sr-section-title">{title}</span>
                  <button className="btn btn-ghost" style={{ marginLeft: "auto", font: "var(--text-body-sm)", color: "var(--color-fg-action)" }}
                    onClick={() => setActiveStep(num - 1)}>
                    <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M11 2.5a2 2 0 0 1 2.8 2.8L5 14l-3.5.8.8-3.5z"/></svg>
                    Edit
                  </button>
                </div>
                <div className="sr-section-body">{children}</div>
              </div>
            );
            const SRRow = ({ label, children }) => (
              <div className="sr-row">
                <div className="sr-row-label">{label}</div>
                <div className="sr-row-value">{children || <span style={{ color: "var(--color-fg-secondary)" }}>—</span>}</div>
              </div>
            );
            const missingRequired = !c.name || !c.queues?.length || !c.startDate || (!c.ongoing && !c.endDate);
            return (
              <div className="wz-step-content">
                <div style={{ marginBottom: "var(--space-5)" }}>
                  <h2 className="setup-section-title">Summary &amp; Review</h2>
                  <p className="setup-section-sub">Review every setting before activating. Click Edit on any section to go back.</p>
                </div>

                {missingRequired && (
                  <div style={{ display: "flex", alignItems: "center", gap: "var(--space-3)", padding: "var(--space-3) var(--space-4)", background: "#fff0f0", border: "1px solid var(--color-status-error)", borderRadius: "var(--radius-md)", marginBottom: "var(--space-4)", font: "var(--text-body-sm)", color: "var(--color-status-error)" }}>
                    <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><circle cx="8" cy="8" r="6"/><line x1="8" y1="5" x2="8" y2="8.5"/><circle cx="8" cy="11" r=".6" fill="currentColor"/></svg>
                    Some required fields are incomplete. Return to the relevant steps to fill them in before activating.
                  </div>
                )}

                {selectedTemplate && (
                  <div style={{ display: "flex", alignItems: "center", gap: "var(--space-3)", padding: "var(--space-2) var(--space-4)", background: "var(--color-bg-active-subtle)", border: "1px solid var(--lyra-brand-200)", borderRadius: "var(--radius-md)", marginBottom: "var(--space-4)", font: "var(--text-body-sm)", color: "var(--lyra-brand-700)" }}>
                    <svg viewBox="0 0 16 16" width="13" height="13" stroke="currentColor" fill="none" strokeWidth="1.5" strokeLinecap="round"><rect x="2" y="1" width="12" height="14" rx="1.5"/><line x1="5" y1="5" x2="11" y2="5"/><line x1="5" y1="8" x2="11" y2="8"/><line x1="5" y1="11" x2="9" y2="11"/></svg>
                    <span><strong>Template applied:</strong> {selectedTemplate.name}</span>
                  </div>
                )}

                <SRSection title="Campaign, Identity &amp; Scope" num={1}>
                  <SRRow label="Campaign Name">{c.name || <span style={{ color: "var(--color-status-error)" }}>Required</span>}</SRRow>
                  {c.description && <SRRow label="Description">{c.description}</SRRow>}
                  <SRRow label="Active Date Range">
                    {c.startDate
                      ? (c.ongoing ? `Ongoing from ${c.startDate}` : c.endDate ? `${c.startDate} — ${c.endDate}` : <span style={{ color: "var(--color-status-error)" }}>End date required</span>)
                      : <span style={{ color: "var(--color-status-error)" }}>Required</span>}
                  </SRRow>
                  <SRRow label="Teams">{c.queues?.length ? c.queues.join(", ") : <span style={{ color: "var(--color-status-error)" }}>Required</span>}</SRRow>
                  <SRRow label="Groups">{c.teams?.length ? c.teams.join(", ") : "All groups"}</SRRow>
                  <SRRow label="Language">English (Default)</SRRow>
                  <SRRow label="Interaction Length">Minimum {c.interactionLength ?? 2} mins</SRRow>
                </SRSection>

                <SRSection title="Suppression Rules" num={2}>
                  <SRRow label="Opt-out tag">{c.suppressOptOut !== false ? "Enabled" : "Disabled"}</SRRow>
                  <SRRow label="Recency window">{c.suppressRecent !== false ? `Enabled · ${c.recentDays ?? 30} days` : "Disabled"}</SRRow>
                </SRSection>


                <SRSection title="Topic AI Model &amp; Survey Template" num={3}>
                  <SRRow label="Topic AI Model">{aiModel ? aiModel.name : <span style={{ color: "var(--color-fg-secondary)" }}>Not configured</span>}</SRRow>
                  <SRRow label="Survey Template">{survey ? survey.name : <span style={{ color: "var(--color-fg-secondary)" }}>Not configured</span>}</SRRow>
                </SRSection>
              </div>
            );
          })()}

          </div>{/* /form-pane */}

          {/* Right rail summary */}
          <aside className="summary-pane">
            <FloatingMetrics campaign={c}/>
          </aside>
        </div>{/* /wz-body */}
      </div>{/* /wz-scroll-area */}

      {/* ── Back / Next footer — outside scroll area, always visible ── */}
      <div className="wz-footer">
        <button className="btn" onClick={onCancel || (() => {})}>Cancel</button>
        <span style={{ flex: 1 }}/>
        {activeStep < 4 ? (
          <>
            <button className="btn" disabled={!canDraft} onClick={() => onSave({ ...c, status: "draft" })}>Save as draft</button>
            <div style={{ width: 1, height: 20, background: "var(--color-border-soft)", margin: "0 var(--space-1)" }}/>
            {activeStep > 0 && (
              <button className="btn" onClick={goBack}>← Back</button>
            )}
            <button className="btn primary" onClick={activeStep === 3 ? handleActivate : goNext}>
              {activeStep === 3 ? "✓ Activate Campaign" : activeStep === 2 ? "Review →" : "Next →"}
            </button>
          </>
        ) : (
          <>
            <button className="btn" onClick={() => onSave({ ...c, status: "draft" })}>Save as draft</button>
            <div style={{ width: 1, height: 20, background: "var(--color-border-soft)", margin: "0 var(--space-1)" }}/>
            <button className="btn" onClick={goBack}>← Back</button>
            <button className="btn primary" disabled={!canActivate}
              onClick={() => onSave({ ...c, status: "active" })}>
              Activate Campaign →
            </button>
          </>
        )}
      </div>

      {/* Activation success overlay */}
      {activating && ReactDOM.createPortal(
        <div className="activate-overlay">
          <div className="activate-card">
            <div className="activate-ring">
              <svg viewBox="0 0 24 24" width="40" height="40" fill="none"
                stroke="var(--lyra-green-500)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="4 13 10 19 20 5" className="activate-check"/>
              </svg>
            </div>
            <h2 className="activate-title">Campaign Activated!</h2>
            <p className="activate-sub">"{c.name}" is now live and running.</p>
          </div>
        </div>,
        document.body
      )}

      {/* Template drawer */}
      {drawerOpen && ReactDOM.createPortal(
        <div className="tmpl-drawer-overlay" onClick={() => setDrawerOpen(false)}>
          <div className="tmpl-drawer" onClick={e => e.stopPropagation()}>
            <div className="tmpl-drawer-head">
              <div style={{ flex: 1 }}>
                <div style={{ font: "600 16px/24px var(--font-sans)", color: "var(--color-fg-default)" }}>Choose a Template</div>
                <div style={{ font: "400 13px/20px var(--font-sans)", color: "var(--color-fg-secondary)", marginTop: 2 }}>
                  Start from a preset — every setting can be customised.
                </div>
              </div>
              <button className="tmpl-drawer-close" onClick={() => setDrawerOpen(false)}>
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" strokeWidth="2" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>
            <div className="tmpl-drawer-body">
              <div className="tmpl-drawer-grid">
                {CAMPAIGN_TEMPLATES.map(t => {
                  const col = CATEGORY_COLOR[t.category] || CATEGORY_COLOR["Customer Satisfaction"];
                  const effortCol = EFFORT_COLOR[t.effort];
                  const isSelected = selectedTemplate?.id === t.id;
                  return (
                    <div key={t.id}
                      className={`tmpl-drawer-card ${isSelected ? "selected" : ""}`}
                      onClick={() => pickTemplate(t)}>

                      {/* Zone 1 — Identity */}
                      <div className="tmpl-drawer-card-head">
                        <div className="tmpl-icon-sm" style={{ background: col.bg, color: col.fg }}>
                          {TEMPLATE_ICONS[t.icon]}
                        </div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div className="tmpl-drawer-card-name">{t.name}</div>
                          <div className="tmpl-drawer-category">{t.category}</div>
                        </div>
                        {isSelected &&
                          <svg viewBox="0 0 16 16" width="16" height="16" stroke="var(--lyra-brand-600)" fill="none" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0, marginTop: 2 }}><polyline points="3 8 6.5 12 13 4"/></svg>
                        }
                      </div>

                      {/* Zone 2 — Use when */}
                      <div className="tmpl-drawer-usewhen-block">
                        <div className="tmpl-drawer-zone-label">Use when</div>
                        <p className="tmpl-drawer-why">{t.why}</p>
                      </div>

                      {/* Zone 3 — Category */}
                      <div className="tmpl-drawer-topics-block">
                        <div className="tmpl-drawer-zone-label">Category</div>
                        <div className="tmpl-tags" style={{ gap: 4 }}>
                          {t.topics.map(tp => <span key={tp} className="tmpl-tag topic">{tp}</span>)}
                        </div>
                      </div>

                      {/* Zone 4 — Meta footer */}
                      <div className="tmpl-drawer-meta-footer">
                        <div className="tmpl-drawer-meta-row-inner">
                          <svg viewBox="0 0 12 12" width="10" height="10" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" style={{ flexShrink: 0, color: "var(--lyra-purple-500)" }}><path d="M6 1v2M6 9v2M1 6h2M9 6h2M2.5 2.5l1.5 1.5M8 8l1.5 1.5M2.5 9.5L4 8M8 4l1.5-1.5"/></svg>
                          <span className="tmpl-drawer-meta-text">{t.aiModel}</span>
                          <span className="tmpl-drawer-meta-dot">·</span>
                          <span className="tmpl-drawer-meta-text">{t.industry}</span>
                        </div>
                      </div>

                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </div>,
        document.body
      )}

      {/* Model picker drawer */}
      {modelDrawerOpen && ReactDOM.createPortal(
        <ModelPickerDrawer
          currentId={c.aiModelId}
          onClose={() => setModelDrawerOpen(false)}
          onSelect={(id) => { set("aiModelId", id); setModelDrawerOpen(false); }}
        />,
        document.body
      )}

      {/* Survey picker drawer */}
      {surveyDrawerOpen && ReactDOM.createPortal(
        <SurveyPickerDrawer
          currentId={c.surveyDesignId}
          onClose={() => setSurveyDrawerOpen(false)}
          onSelect={(id) => { set("surveyDesignId", id); setSurveyDrawerOpen(false); }}
        />,
        document.body
      )}
    </div>
  );
}

function ModelPickerDrawer({ currentId, onClose, onSelect }) {
  const [query, setQuery] = React.useState("");
  const [pendingId, setPendingId] = React.useState(currentId || "");
  const [expandedId, setExpandedId] = React.useState(null);
  const inputRef = React.useRef(null);
  const rowRefs = React.useRef({});
  const detailsRefs = React.useRef({});

  React.useEffect(() => { inputRef.current?.focus(); }, []);

  React.useEffect(() => {
    if (!expandedId) return;
    const el = detailsRefs.current[expandedId];
    if (el) setTimeout(() => el.scrollIntoView({ behavior: "smooth", block: "nearest" }), 80);
  }, [expandedId]);

  const filtered = query.trim()
    ? AI_MODELS.filter(m =>
        m.name.toLowerCase().includes(query.toLowerCase()) ||
        m.description.toLowerCase().includes(query.toLowerCase()) ||
        m.tags.some(t => t.toLowerCase().includes(query.toLowerCase()))
      )
    : AI_MODELS;

  return (
    <div className="tmpl-drawer-overlay" onClick={onClose}>
      <div className="model-picker-drawer" onClick={e => e.stopPropagation()}>

        {/* Header */}
        <div className="model-picker-head">
          <div style={{ flex: 1 }}>
            <div style={{ font: "600 16px/24px var(--font-sans)", color: "var(--color-fg-default)" }}>Choose AI Model</div>
            <div style={{ font: "400 13px/20px var(--font-sans)", color: "var(--color-fg-secondary)", marginTop: 2 }}>
              Select the model that best fits your campaign goals.
            </div>
          </div>
          <button className="tmpl-drawer-close" onClick={onClose}>
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" strokeWidth="2" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        {/* Search */}
        <div className="model-picker-search-wrap">
          <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" style={{ color: "var(--color-fg-secondary)", flexShrink: 0 }}><circle cx="6.5" cy="6.5" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg>
          <input
            ref={inputRef}
            className="model-picker-search"
            placeholder="Search model by name, industry…"
            value={query}
            onChange={e => setQuery(e.target.value)}
          />
          {query && (
            <button className="model-picker-search-clear" onClick={() => setQuery("")}>
              <svg viewBox="0 0 12 12" width="10" height="10" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" fill="none"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg>
            </button>
          )}
        </div>

        {/* Count */}
        <div className="model-picker-count">
          {filtered.length} model{filtered.length !== 1 ? "s" : ""}
          {query ? ` matching "${query}"` : " available"}
        </div>

        {/* Model list */}
        <div className="model-picker-list">
          {filtered.length === 0 ? (
            <div style={{ padding: "var(--space-8) var(--space-6)", textAlign: "center", color: "var(--color-fg-secondary)", font: "400 14px/20px var(--font-sans)" }}>
              No models match your search.
            </div>
          ) : filtered.map(m => {
            const isSelected = pendingId === m.id;
            return (
              <div key={m.id}
                ref={el => rowRefs.current[m.id] = el}
                className={`model-picker-row ${isSelected ? "selected" : ""}`}
                onClick={() => setPendingId(m.id)}>
                <div className="model-picker-row-head">
                  <span className={`lyra-radio ${isSelected ? "selected" : ""}`} style={{ marginTop: 2, flexShrink: 0 }}/>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: "var(--space-2)", flexWrap: "wrap" }}>
                      <span style={{ font: "500 14px/20px var(--font-sans)", color: "var(--color-fg-default)" }}>{m.name}</span>
                      {m.badge && <span className="model-badge">{m.badge}</span>}
                    </div>
                    {m.whenToUse && (
                      <div style={{ display: "flex", alignItems: "flex-start", gap: 5, marginTop: 6 }}>
                        <svg viewBox="0 0 12 12" width="11" height="11" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0, marginTop: 2, color: "var(--color-fg-action)" }}><circle cx="6" cy="6" r="5"/><path d="M6 4v2.5l1.5 1"/></svg>
                        <span style={{ font: "400 11px/16px var(--font-sans)", color: "var(--color-fg-secondary)" }}>{m.whenToUse}</span>
                      </div>
                    )}
                    {m.industry && (
                      <div style={{ display: "flex", alignItems: "flex-start", gap: 5, marginTop: 4 }}>
                        <svg viewBox="0 0 12 12" width="11" height="11" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0, marginTop: 2, color: "var(--color-fg-action)" }}><rect x="1" y="5" width="10" height="6" rx="1"/><path d="M4 5V3.5a2 2 0 0 1 4 0V5"/></svg>
                        <span style={{ font: "400 11px/16px var(--font-sans)", color: "var(--color-fg-secondary)" }}>{m.industry}</span>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        {/* Footer */}
        <div className="model-picker-foot">
          <button className="clear-link" onClick={onClose}>Cancel</button>
          <button className="btn primary" disabled={!pendingId} onClick={() => onSelect(pendingId)}>
            Apply selection
          </button>
        </div>

      </div>
    </div>
  );
}

function SurveyPickerDrawer({ currentId, onClose, onSelect }) {

                      <div style={{ display: "flex", alignItems: "flex-start", gap: 5, marginTop: 5 }}>
                        <svg viewBox="0 0 14 14" width="12" height="12" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0, marginTop: 2, color: "var(--color-fg-action)" }}><path d="M1 4.5C3.5 2 10.5 2 13 4.5"/><path d="M3 7c1.4-1.4 7.6-1.4 8 0"/><path d="M5.5 9.5c.8-.8 2.2-.8 3 0"/><circle cx="7" cy="12" r=".6" fill="currentColor" stroke="none"/></svg>

function MiniBar({ data, max, color = "var(--fi-accent)", labels }) {
  const m = max || Math.max(...data, 1);
  return (
    <div style={{ display: "flex", alignItems: "flex-end", gap: 6, height: 120, padding: "0 var(--space-1)" }}>
      {data.map((v, i) => (
        <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
          <div style={{
            width: "100%",
            height: `${(v / m) * 100}%`,
            background: color,
            borderRadius: "4px 4px 0 0",
            minHeight: 2,
            opacity: 0.85,
          }}/>
          <div style={{ font: "400 12px/16px var(--font-sans)", color: "var(--lyra-slate-500)" }}>{labels?.[i]}</div>
        </div>
      ))}
    </div>
  );
}

function DonutRing({ value, max = 100, color = "var(--fi-accent)", size = 96, label, sub }) {
  const r = (size - 14) / 2;
  const C = 2 * Math.PI * r;
  const off = C - (value / max) * C;
  return (
    <div style={{ position: "relative", width: size, height: size, flexShrink: 0 }}>
      <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--lyra-slate-200)" strokeWidth="10"/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="10"
          strokeDasharray={C} strokeDashoffset={off} strokeLinecap="round"
          transform={`rotate(-90 ${size/2} ${size/2})`}/>
      </svg>
      <div style={{
        position: "absolute", inset: 0,
        display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center",
      }}>
        <div style={{ font: "700 20px/24px var(--font-sans)", color: "var(--lyra-slate-900)", letterSpacing: "-0.02em" }}>{label}</div>
        {sub ? <div style={{ font: "500 12px/16px var(--font-sans)", color: "var(--lyra-slate-500)" }}>{sub}</div> : null}
      </div>
    </div>
  );
}

  React.useEffect(() => {
    if (!open) return;
    function onDown(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener("mousedown", onDown);
    return () => document.removeEventListener("mousedown", onDown);

  const actions = [
    { label: "Action 1", icon: <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><circle cx="8" cy="8" r="6"/><line x1="8" y1="5" x2="8" y2="11"/><line x1="5" y1="8" x2="11" y2="8"/></svg> },

  return (

        <svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg>

  );
}

              </button>
            </div>
          </div>
        </div>,
        document.body
      )}

      <div className="detail-layout" style={{ flex: 1 }}>
        <div className="detail-main">
          <ConfigurationView campaign={c}/>
        </div>
        <aside className="detail-sidebar">
          <CampaignSummaryCard campaign={c}/>

      </div>

      </div>{/* /scrollable body */}

      {/* Bottom action bar */}
      <div className="wz-footer">
        <button className="btn" onClick={onBack}>← Back</button>

      {toast ? (
        <div className="toast">
          <svg viewBox="0 0 24 24"><polyline points="4 13 10 19 20 5"/></svg>
          {toast.msg}
        </div>
      ) : null}
    </div>
  );
}

function DefRow({ label, tooltip, children }) {

/* ConfigGroup — collapsible accordion card for read-only display. */
function ConfigGroup({ title, num, children, defaultOpen = true }) {
  const [open, setOpen] = React.useState(defaultOpen);
  return (
    <section className={`cfg-group${open ? "" : " cfg-group--closed"}`}>
      <header className="cfg-group-head" onClick={() => setOpen(!open)}>
        <span className="cfg-group-num">{num}</span>
        <span className="cfg-group-title">{title}</span>
        <svg className="cfg-group-chev" viewBox="0 0 16 16">
          <path d="M3.5 6 8 10.5 12.5 6" stroke="currentColor" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </header>
      {open && <div className="cfg-group-body">{children}</div>}
    </section>
  );
}

function ConfigurationView({ campaign: c }) {
  const dateRange = c.startDate
    ? (c.ongoing ? `Ongoing from ${c.startDate}` : c.endDate ? `${c.startDate} — ${c.endDate}` : `${c.startDate} — No end date`)
    : "Ongoing from " + c.created;

  const aiModel = AI_MODELS?.find(m => m.id === c.aiModelId);
  const survey  = (window.SEED_DESIGNS || SURVEY_DESIGNS)?.find(s => s.id === c.surveyDesignId);

  return (
    <div className="cfg-group-stack">
      {/* Step 0 mirror: Template, Identity &amp; Scope */}
      <ConfigGroup num="1" title="Campaign Identity & Scope">
        <DefRow label="Campaign Name">{c.name}</DefRow>
        {c.description && <DefRow label="Description">{c.description}</DefRow>}
        <DefRow label="Active Date Range">{dateRange}</DefRow>
        <DefRow label="Teams">{c.queues?.length ? c.queues.join(", ") : <span style={{ color: "var(--color-fg-secondary)" }}>Not set</span>}</DefRow>
        <DefRow label="Groups">{c.teams?.length ? c.teams.join(", ") : "All groups"}</DefRow>
        <DefRow label="Language">English (Default)</DefRow>
        <DefRow label="Interaction Length">Minimum {c.interactionLength ?? 2} mins</DefRow>
      </ConfigGroup>

      {/* Step 1 mirror: Suppression Rules */}
      <ConfigGroup num="2" title="Suppression Rules">
        <DefRow label="Opt-out tag" tooltip="When enabled, customers who have opted out of surveys are automatically excluded from receiving this campaign.">
          {c.suppressOptOut !== false ? "Enabled" : "Disabled"}
        </DefRow>
        <DefRow label="Recency window" tooltip="Prevents a customer from receiving this survey if they were already surveyed within the defined number of days. Reduces survey fatigue.">
          {c.suppressRecent !== false ? `Enabled · ${c.recentDays ?? 30} days` : "Disabled"}
        </DefRow>
      </ConfigGroup>


      {/* Step 2 mirror: Topic AI Model & Survey Template */}
      <ConfigGroup num="3" title="Topic AI Model &amp; Survey Template">
        <DefRow label="Topic AI Model">
          {aiModel ? aiModel.name : <span style={{ color: "var(--color-fg-secondary)" }}>Not configured</span>}
        </DefRow>
        <DefRow label="Survey Template">
          {survey ? survey.name : <span style={{ color: "var(--color-fg-secondary)" }}>Not configured</span>}
        </DefRow>
      </ConfigGroup>
    </div>
  );
}

    { n: 3, label: "Summary & Review", done: false },
  ];

  function stepState(s) {
    if (s.n === activeStep) return "active";
    if (visitedSteps.has(s.n) && s.done) return "done";
    if (visitedSteps.has(s.n) && !s.done) return "error";
    return "default";
  }

    setVisitedSteps(prev => new Set([...prev, activeStep]));
    setActiveStep(prev => Math.min(prev + 1, 4));
  }

  function goBack() {
    setActiveStep(prev => Math.max(prev - 1, 0));
  }

  const canSave = !!d.name;

  return (
    <div className="pane" style={{ overflow: "hidden" }}>
      {/* Breadcrumb */}
      <div className="crumbs">
        <a href="#" onClick={e => { e.preventDefault(); onCancel(); }}>Survey Templates</a>
        <span className="sep">/</span>
        <span className="last">{isEdit ? d.name : "New Survey Template"}</span>
      </div>

      {/* Page header */}
      <div className="pane-head" style={{ paddingTop: 6 }}>
        <h1>{isEdit ? d.name : "New Survey Template"}</h1>
      </div>

      {/* ── Horizontal Wizard Bar ── */}
      <div className="wz-bar">
        <div className="wz-bar-inner">
          {STEPS.map((s, i) => {
            const st = stepState(s);
            const prevDone = i > 0 && stepState(STEPS[i - 1]) === "done";
            return (
              <React.Fragment key={s.n}>
                {i > 0 && <div className={`wz-line ${prevDone ? "done" : ""}`}/>}
                <div className={`wz-step ${st}`} onClick={() => setActiveStep(s.n)}>
                  <div className="wz-node">
                    {st === "done" ? (
                      <svg viewBox="0 0 12 12" width="10" height="10" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="2 6 5 9.5 10 2.5"/></svg>
                    ) : s.n + 1}
                  </div>
                  <div className="wz-label">{s.label}</div>
                </div>
              </React.Fragment>
            );
          })}
        </div>
      </div>

      {/* ── Wizard body ── */}
      <div className="wz-scroll-area">
        <div className="wz-body" style={{ gridTemplateColumns: "1fr" }}>
          <div className="form-pane sv-form">

          {/* ── Step 0: Identity ── */}
          {activeStep === 0 && (()=>{
            const showErr = visitedSteps.has(0);
            const nameErr = showErr && !d.name;
            return <div className="wz-step-content">
              <div className="setup-section">
                <div className="setup-section-head">
                  <div>
                    <h2 className="setup-section-title">Identity</h2>
                    <p className="setup-section-sub">Name this template so your team knows when to use it.</p>
                  </div>
                </div>
                <div className="setup-section-body">
                  <div className="field-grid-2">
                    <div className="field-cell">
                      <label className="field-label">Template Name<span className="req">*</span><span className="char-counter">{(d.name || "").length}/50</span></label>
                      <input className={`fi-input${nameErr ? " error" : ""}`} placeholder="e.g. Post-Chat CSAT" maxLength={50}
                        aria-invalid={nameErr || undefined}
                        value={d.name} onChange={e => set("name", e.target.value)}/>
                      {nameErr && <div className="field-control"><span className="error-msg">
                        <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><circle cx="8" cy="8" r="6"/><line x1="8" y1="5" x2="8" y2="8.5"/><circle cx="8" cy="11" r=".6" fill="currentColor"/></svg>
                        Template name is required
                      </span></div>}
                    </div>
                    <div className="field-cell">
                      <label className="field-label">
                        Description
                        <span className="char-counter">{(d.description || "").length}/200</span>
                      </label>
                      <textarea className="fi-input" rows={3} maxLength={200} placeholder="What this template is for and which campaigns should use it."
                        value={d.description} onChange={e => set("description", e.target.value)}/>
                      <div className="help">Help your team understand when to apply this template.</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>;
          })()}

          {/* ── Step 1: Survey Content ── */}
          {activeStep === 1 && (()=>{
            const showErr = visitedSteps.has(1);
            const scaleErr = showErr && !d.defaultScaleQuestion;
            return <div className="wz-step-content">

              {/* ── Card 1: Channel ── */}
              <div className="setup-section" style={{ background: "var(--lyra-white)", borderColor: "rgba(0,0,0,0.08)" }}>
                <div className="setup-section-head" style={{ background: "var(--lyra-white)" }}>
                  <div>
                    <h2 className="setup-section-title">Channel</h2>
                    <p className="setup-section-sub">Choose how this survey is delivered to customers.</p>
                  </div>
                </div>
                <div className="setup-section-body">
                  <div className="field-cell">
                      <label className="field-label">Survey Channel<span className="req">*</span></label>
                      <Segmented options={["Digital", "IVR", "All"]}
                        disabled={["All"]}
                        value={d.channel} onChange={v => set("channel", v)}/>
                      <div className="help">
                        {d.channel === "Digital" ? "Delivered on chat, AI sessions, social & email." :
                         d.channel === "IVR"     ? "Sent after a phone call — customers respond using their keypad." :
                                                   "Delivered on both phone and digital channels."}
                      </div>
                  </div>
                </div>
              </div>

              {/* ── Card 2: Welcome Message ── */}
              <div className="setup-section">
                <div className="setup-section-head">
                  <div>
                    <h2 className="setup-section-title">Welcome Message</h2>
                    <p className="setup-section-sub">Optionally introduce the survey before the first question.</p>
                  </div>
                </div>
                <div className="setup-section-body">
                  <div className="field-cell">
                      <label className="field-label">Message Mode<span className="req">*</span></label>
                      <div className="welcome-mode-radio">
                        {(d.channel === "IVR" ? [
                          { v: "with-optout",    label: "Invitation with Opt Out",    desc: "After hearing the message, the customer can press 1 to decline." },
                          { v: "without-optout", label: "Invitation without Opt Out", desc: "The customer hears the message, then goes to the survey." },
                          { v: "none",           label: "None",                       desc: "Survey starts immediately with no introduction." },
                        ] : [
                          { v: "with-optout",    label: "Invitation with Opt Out",    desc: "Customer can read the invitation & choose to decline it." },
                          { v: "without-optout", label: "Invitation without Opt Out", desc: "Customer sees the invitation & start button only." },
                          { v: "none",           label: "None",                       desc: "Survey starts immediately with no introduction." },
                        ]).map(opt => (
                          <label key={opt.v} className={`welcome-mode-option ${d.welcomeMode === opt.v ? "on" : ""}`}>
                            <input type="radio" name="welcomeMode" value={opt.v}
                              checked={d.welcomeMode === opt.v}
                              onChange={() => set("welcomeMode", opt.v)}/>
                            <span className="dot"/>
                            <span className="body">
                              <span className="title">{opt.label}</span>
                              <span className="desc">{opt.desc}</span>
                            </span>
                          </label>
                        ))}
                      </div>
                    </div>
                    {d.welcomeMode !== "none" && (
                      <div className="field-cell" style={{ marginTop: "var(--space-4)" }}>
                        <label className="field-label">Invitation Text</label>
                        <div style={{ borderRadius: "var(--radius-md)", background: "var(--lyra-slate-50)", border: "1px solid var(--color-border-subtle)", padding: "var(--space-4)" }}>
                          <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: "var(--space-2)" }}>
                            <span style={{ font: "400 12px/16px var(--font-sans)", color: (d.welcomeMessage || "").length > 220 ? "var(--fi-amber)" : "var(--lyra-slate-400)" }}>
                              {(d.welcomeMessage || "").length}/240
                            </span>
                          </div>
                          <textarea className="fi-input" rows={3} maxLength={240}
                            style={{ resize: "vertical", minHeight: 72, background: "var(--lyra-white)" }}
                            placeholder={`"{{First Name}}", we'd love to hear about your experience today. Just two minutes of your time.`}
                            value={d.welcomeMessage}
                            onChange={e => set("welcomeMessage", e.target.value)}/>
                          {(d.channel === "Digital" || d.channel === "Both") && (
                            <div style={{ display: "grid", gridTemplateColumns: d.welcomeMode === "with-optout" ? "1fr 1fr" : "1fr", gap: "var(--space-3)", marginTop: "var(--space-4)", paddingTop: "var(--space-3)", borderTop: "1px solid var(--color-border-subtle)" }}>
                              <div>
                                <div style={{ font: "500 11px/16px var(--font-sans)", color: "var(--color-fg-secondary)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: "var(--space-1)" }}>Start survey button label</div>
                                <input className="fi-input" disabled readOnly value={d.buttonToStart}
                                  style={{ background: "var(--lyra-slate-200)", color: "var(--lyra-slate-600)", cursor: "not-allowed" }}/>
                              </div>
                              {d.welcomeMode === "with-optout" && (
                                <div>
                                  <div style={{ font: "500 11px/16px var(--font-sans)", color: "var(--color-fg-secondary)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: "var(--space-1)" }}>Opt-out button label</div>
                                  <input className="fi-input" disabled readOnly value={d.buttonToOptOut}
                                    style={{ background: "var(--lyra-slate-200)", color: "var(--lyra-slate-600)", cursor: "not-allowed" }}/>
                                </div>
                              )}
                            </div>
                          )}
                          {d.channel === "IVR" && (
                            <div className="help" style={{ marginTop: "var(--space-3)", padding: "var(--space-2) var(--space-3)", borderRadius: "var(--radius-sm)", background: "rgba(0,0,0,0.03)" }}>
                              On phone surveys, this message is read aloud. The customer presses 1 to start or hangs up to skip.
                            </div>
                          )}
                        </div>
                      </div>
                    )}
                </div>
              </div>

              {/* ── Card 3: Rating Format ── */}
              <div className="setup-section">
                <div className="setup-section-head">
                  <div>
                    <h2 className="setup-section-title">Rating Format</h2>
                    <p className="setup-section-sub">Choose the rating scale and how answer options are displayed.</p>
                  </div>
                </div>
                <div className="setup-section-body">
                    {(d.channel === "Digital" || d.channel === "Both") && (
                      <>
                        <div className="field-cell" style={{ marginBottom: d.displayStyle === "List Picker" ? "var(--space-5)" : 0 }}>
                          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "var(--space-2)" }}>
                            <label className="field-label" style={{ margin: 0 }}>Digital Display Style<span className="req">*</span></label>
                            <button className="clear-link" style={{ fontSize: 13, color: "var(--color-fg-action)", display: "flex", alignItems: "center", gap: 5 }}
                              onClick={() => setShowPreview(true)}>
                              <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                                <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z"/><circle cx="8" cy="8" r="2"/>
                              </svg>
                              Preview
                            </button>
                          </div>
                          <Segmented options={["Quick Reply", "List Picker"]}
                            value={d.displayStyle} onChange={v => set("displayStyle", v)}/>
                          <div className="help">
                            {d.displayStyle === "Quick Reply"
                              ? "Inline tappable bubbles — fastest to answer, best for mobile."
                              : "Rating options as a scrollable list — good for desktop."}
                          </div>
                        </div>
                        {d.displayStyle === "List Picker" && (
                          <div className="field-cell">
                            <label className="field-label">List Picker Label<span className="req">*</span></label>
                            <input className="fi-input" maxLength={20}
                              placeholder="Rate your experience"
                              value={d.listPickerLabel}
                              onChange={e => set("listPickerLabel", e.target.value)}/>
                            <div className="help">{(d.listPickerLabel || "").length}/20 characters</div>
                          </div>
                        )}
                      </>
                    )}
                    {showPreview && ReactDOM.createPortal(
                      <div style={{ position: "fixed", inset: 0, zIndex: 900, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(0,0,0,0.40)" }}
                        onClick={() => setShowPreview(false)}>
                        <div style={{ background: "var(--lyra-white)", borderRadius: 16, padding: "28px 28px 24px", width: 380, boxShadow: "0px 12px 24px rgba(0,0,0,0.12)" }}
                          onClick={e => e.stopPropagation()}>
                          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
                            <div>
                              <div style={{ font: "600 15px/20px var(--font-sans)", color: "var(--color-fg-default)" }}>
                                {d.displayStyle === "Quick Reply" ? "Quick Reply" : "List Picker"} Preview
                              </div>
                              <div style={{ font: "400 12px/16px var(--font-sans)", color: "var(--color-fg-secondary)", marginTop: 2 }}>How customers will see the survey</div>
                            </div>
                            <button onClick={() => setShowPreview(false)} style={{ background: "none", border: "none", cursor: "pointer", color: "var(--color-fg-secondary)", padding: 4 }}>
                              <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><line x1="12" y1="4" x2="4" y2="12"/><line x1="4" y1="4" x2="12" y2="12"/></svg>
                            </button>
                          </div>
                          <div style={{ background: "#f5f7f9", borderRadius: 12, padding: "16px 14px", border: "1px solid rgba(0,0,0,0.08)" }}>
                            <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
                              <div style={{ width: 28, height: 28, borderRadius: "50%", background: "var(--lyra-brand-500)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                                <svg viewBox="0 0 16 16" width="14" height="14" fill="white"><circle cx="8" cy="6" r="3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" fill="white"/></svg>
                              </div>
                              <div style={{ background: "var(--lyra-white)", borderRadius: "4px 12px 12px 12px", padding: "10px 12px", font: "400 13px/18px var(--font-sans)", color: "var(--color-fg-default)", boxShadow: "0 1px 2px rgba(0,0,0,0.06)", maxWidth: 260 }}>
                                {d.defaultScaleQuestion || "On a scale of 1 to 5, how would you rate your experience today?"}
                              </div>
                            </div>
                            {d.displayStyle === "Quick Reply" ? (
                              <div style={{ display: "flex", flexWrap: "wrap", gap: 6, paddingLeft: 36 }}>
                                {["1", "2", "3", "4", "5"].map(n => (
                                  <div key={n} style={{ background: "var(--lyra-white)", border: "1px solid var(--lyra-brand-500)", borderRadius: 20, padding: "6px 14px", font: "500 13px/18px var(--font-sans)", color: "var(--lyra-brand-600)", cursor: "pointer" }}>{n}</div>
                                ))}
                              </div>
                            ) : (
                              <div style={{ paddingLeft: 36 }}>
                                <div style={{ background: "var(--lyra-white)", borderRadius: 10, overflow: "hidden", border: "1px solid rgba(0,0,0,0.08)" }}>
                                  {d.listPickerLabel && (
                                    <div style={{ padding: "8px 14px", font: "500 11px/16px var(--font-sans)", color: "var(--color-fg-secondary)", textTransform: "uppercase", letterSpacing: "0.05em", borderBottom: "1px solid rgba(0,0,0,0.06)", background: "#f5f7f9" }}>
                                      {d.listPickerLabel}
                                    </div>
                                  )}
                                  {["1 — Poor", "2 — Fair", "3 — Good", "4 — Very Good", "5 — Excellent"].map((r, i, arr) => (
                                    <div key={r} style={{ padding: "10px 14px", font: "400 13px/18px var(--font-sans)", color: "var(--color-fg-default)", borderBottom: i < arr.length - 1 ? "1px solid rgba(0,0,0,0.06)" : "none", cursor: "pointer" }}>{r}</div>
                                  ))}
                                </div>
                              </div>
                            )}
                          </div>
                          <div style={{ marginTop: 16, font: "400 12px/16px var(--font-sans)", color: "var(--color-fg-secondary)", textAlign: "center" }}>
                            Click outside or press × to close
                          </div>
                        </div>
                      </div>,
                      document.body
                    )}
                </div>
              </div>

            </div>;
          })()}

          {/* ── Step 2: Linked Campaigns ── */}
          {activeStep === 2 && (
            <div className="wz-step-content">
              <div className="setup-section">
                <div className="setup-section-head">
                  <div>
                    <h2 className="setup-section-title">Linked Campaigns</h2>
                    {isEdit && <p className="setup-section-sub">Campaigns currently using this template. To link or unlink campaigns, edit the individual campaign.</p>}
                  </div>
                </div>
                <div className="setup-section-body">
                  {(!isEdit || d.isDefault) ? (
                    <div style={{
                      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                      padding: "var(--space-10) var(--space-8)", textAlign: "center",
                      background: "var(--lyra-slate-50)", borderRadius: "var(--radius-md)",
                      border: "1px dashed var(--color-border-soft)"
                    }}>
                      <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="var(--lyra-slate-400)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{ marginBottom: 12 }}>
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                      </svg>
                      <p style={{ font: "500 14px/20px var(--font-sans)", color: "var(--color-fg-default)", margin: "0 0 6px" }}>
                        No campaigns linked yet
                      </p>
                      <p style={{ font: "400 13px/18px var(--font-sans)", color: "var(--color-fg-secondary)", margin: 0, maxWidth: 400 }}>
                        Save this template first, then go to a Campaign and select this template to link it. Linked campaigns will appear here automatically.
                      </p>
                    </div>
                  ) : (
                    <LinkedCampaignsTable
                      linkedIds={linkedIds}
                      currentDesignId={initial?.id}
                    />
                  )}
                </div>
              </div>
            </div>
          )}

          {/* ── Step 3: Summary & Review ── */}
          {activeStep === 3 && (() => {
            const missingRequired = !d.name;
            const SRSection = ({ title, num, children, noEdit }) => (
              <div className="sr-section">
                <div className="sr-section-head">
                  <span className="sr-section-num">{num}</span>
                  <span className="sr-section-title">{title}</span>
                  {!noEdit && (
                    <button className="btn btn-ghost" style={{ marginLeft: "auto", font: "var(--text-body-sm)", color: "var(--color-fg-action)" }}
                      onClick={() => setActiveStep(num - 1)}>
                      <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M11 2.5a2 2 0 0 1 2.8 2.8L5 14l-3.5.8.8-3.5z"/></svg>
                      Edit
                    </button>
                  )}
                </div>
                <div className="sr-section-body">{children}</div>
              </div>
            );
            const SRRow = ({ label, children }) => (
              <div className="sr-row">
                <div className="sr-row-label">{label}</div>
                <div className="sr-row-value">{children || <span style={{ color: "var(--color-fg-secondary)" }}>—</span>}</div>
              </div>
            );
            return (
              <div className="wz-step-content">
                <div style={{ marginBottom: "var(--space-5)" }}>
                  <h2 className="setup-section-title">Summary &amp; Review</h2>
                  <p className="setup-section-sub">Review every setting before saving. Click Edit on any section to go back.</p>
                </div>

                {missingRequired && (
                  <div style={{ display: "flex", alignItems: "center", gap: "var(--space-3)", padding: "var(--space-3) var(--space-4)", background: "#fff0f0", border: "1px solid var(--color-status-error)", borderRadius: "var(--radius-md)", marginBottom: "var(--space-4)", font: "var(--text-body-sm)", color: "var(--color-status-error)" }}>
                    <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><circle cx="8" cy="8" r="6"/><line x1="8" y1="5" x2="8" y2="8.5"/><circle cx="8" cy="11" r=".6" fill="currentColor"/></svg>
                    Some required fields are incomplete. Return to the relevant steps to fill them in.
                  </div>
                )}

                <SRSection title="Identity" num={1}>
                  <SRRow label="Template Name">{d.name || <span style={{ color: "var(--color-status-error)" }}>Required</span>}</SRRow>
                  {d.description && <SRRow label="Description">{d.description}</SRRow>}
                </SRSection>

                <SRSection title="Survey Content" num={2}>
                  <SRRow label="Survey Channel">{d.channel || "Digital"}</SRRow>
                  <SRRow label="Welcome Message">
                    {d.welcomeMode === "with-optout"    ? "Invitation with Opt Out" :
                     d.welcomeMode === "without-optout" ? "Invitation without Opt Out" : "None"}
                  </SRRow>
                  {d.welcomeMode !== "none" && d.welcomeMessage && (
                    <SRRow label="Invitation Text">
                      <span style={{ display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden" }}>{d.welcomeMessage}</span>
                    </SRRow>
                  )}
                  {(d.channel === "Digital" || d.channel === "Both") && (
                    <SRRow label="Display Style">{d.displayStyle || "Quick Reply"}</SRRow>
                  )}
                  {true && <>
                    <SRRow label="Rating Question">{d.defaultScaleQuestion || <span style={{ color: "var(--color-status-error)" }}>Required</span>}</SRRow>
                    {d.defaultCommentQuestion && <SRRow label="Follow-up Question">{d.defaultCommentQuestion}</SRRow>}
                  </>}
                </SRSection>

                <SRSection title="Linked Campaigns" num={3} noEdit>
                  <LinkedCampaignsTable linkedIds={linkedIds} currentDesignId={initial?.id} />
                </SRSection>
              </div>
            );
          })()}

          </div>

        </div>
      </div>

      {/* ── Wizard Footer ── */}
      <div className="wz-footer">
        <button className="btn" onClick={onCancel}>Cancel</button>
        <span style={{ flex: 1 }}/>
        {activeStep < 3 ? (
          <>
            {activeStep > 0 && (
              <button className="btn" onClick={goBack}>← Back</button>
            )}
            <button className="btn primary" onClick={goNext}>
              {activeStep === 2 ? "Review →" : "Next →"}
            </button>
          </>
        ) : (
          <>
            <button className="btn" onClick={goBack}>← Back</button>
            <button className="btn primary" disabled={!canSave} onClick={handleSaveTemplate}>
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 13 10 19 20 5"/></svg>
              {isEdit ? "Save changes" : "Save template"}
            </button>
          </>
        )}
      </div>

      {/* Save success overlay */}
      {saving && ReactDOM.createPortal(
        <div className="activate-overlay">
          <div className="activate-card">
            <div className="activate-ring">
              <svg viewBox="0 0 24 24" width="40" height="40" fill="none"
                stroke="var(--lyra-green-500)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="4 13 10 19 20 5" className="activate-check"/>
              </svg>
            </div>
            <h2 className="activate-title">Template Saved!</h2>
            <p className="activate-sub">"{d.name}" is ready to use in campaigns.</p>
          </div>
        </div>,
        document.body
      )}
    </div>
  );
}

function LinkedCampaignsTable({ linkedIds, currentDesignId }) {
  const all = window.CAMPAIGNS || [];
  const rows = all.filter(c => linkedIds.includes(c.id) && c.status !== "draft" && c.status !== "inactive");

  return (
    <div>
      {rows.length === 0 ? (

function ScorePreview({ topics, sentiments }) {
  // Mock contributions for a sample "Tier-1 billing chat" interaction.
  const sample = [
    { topic: "Resolution",            sentiment: "neg",  raw: 60 },
    { topic: "Agent empathy",         sentiment: "pos",  raw: 85 },
    { topic: "Effort / ease",         sentiment: "neg",  raw: 55 },
    { topic: "Wait time",             sentiment: "neu",  raw: 70 },
    { topic: "Billing accuracy",      sentiment: "vneg", raw: 40 },
  ];
  const get = (name) => topics.find(t => t.name === name);
  const sentMul = (id) => sentiments.find(s => s.id === id)?.multiplier ?? 1;
  let weighted = 0, totalW = 0;
  for (const row of sample) {
    const t = get(row.topic);
    if (!t || !t.active) continue;
    weighted += row.raw * sentMul(row.sentiment) * (t.weight / 100);
    totalW += t.weight;
  }
  const composite = totalW > 0 ? Math.round(weighted * (100 / totalW)) : 0;
  const color = composite >= 70 ? "var(--fi-green)" : composite >= 50 ? "var(--fi-amber)" : "var(--fi-red)";

  return (
    <div style={{
      background: "var(--lyra-white)", border: "1px solid rgba(0,0,0,0.08)",
      borderRadius: 12, padding: 16,
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>

        </span>
        <div style={{ font: "500 14px/20px Inter", color: "var(--lyra-slate-900)" }}>Live score preview</div>
      </div>
      <div style={{ font: "400 12px/16px Inter", color: "var(--lyra-slate-500)", marginBottom: 14 }}>
        Sample: Tier-1 billing chat · 8 min · escalated
      </div>
      <div style={{ display: "flex", alignItems: "baseline", justifyContent: "center", gap: 4, marginBottom: 14 }}>
        <span style={{ font: "600 56px/1 Inter", letterSpacing: "-0.03em", color }}>{composite}</span>
        <span style={{ font: "500 14px/1 Inter", color: "var(--lyra-slate-500)" }}>/ 100</span>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
        {sample.map((row, i) => {
          const t = get(row.topic);
          if (!t || !t.active) return null;
          const contribution = row.raw * sentMul(row.sentiment) * (t.weight / 100);
          return (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, font: "400 var(--space-3)/var(--space-4) Inter", color: "var(--lyra-slate-600)" }}>
              <span style={{ flex: 1, color: "var(--lyra-slate-900)", fontWeight: 500 }}>{row.topic}</span>
              <span style={{ color: "var(--lyra-slate-400)" }}>{row.raw}</span>
              <span style={{ color: "var(--lyra-slate-400)", width: 36, textAlign: "right" }}>×{sentMul(row.sentiment).toFixed(2)}</span>
              <span style={{ color: "var(--lyra-slate-400)", width: 36, textAlign: "right" }}>×{(t.weight/100).toFixed(2)}</span>
              <span style={{ color: "var(--lyra-slate-900)", fontWeight: 600, width: 36, textAlign: "right" }}>
                {contribution.toFixed(1)}
              </span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

    Experience: "var(--lyra-purple-500)",
    Channel:    "var(--lyra-orange-700)",
    Loyalty:    "var(--lyra-red-600)",
  }[cat] || "var(--lyra-slate-500)";
}

/* ---------- Chart ---------- */
const CHART_DATA_VALUES = [
  32,58,60,63,67,58,30,33,58,62,68,70,62,30,28,
  55,58,62,64,58,38,42,55,58,62,70,55,33,19,50,
  58,62,65,60,38,40,55,60,87,70,62,40,38,55,58,
  62,61,58,38,42,58,65,72,22,40,30,32,55,60,53,
];
const CHART_OUTLIER_MAP = { 28: 'low', 38: 'high', 53: 'low' };

function ResponseRateChart() {
  const [hovered, setHovered] = useStateD(null);
  const data = useMemoD(() => {
    const start = new Date('2026-03-15T00:00:00');
    return CHART_DATA_VALUES.map((v, i) => {
      const d = new Date(start); d.setDate(start.getDate() + i);
      const day = d.getDay();
      return { i, y: v, date: d.toLocaleDateString('en-US',{month:'short',day:'numeric'}), fullDate: d.toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric'}), isWeekend: day===0||day===6, outlier: CHART_OUTLIER_MAP[i] };
    });
  }, []);

  const width=1200, height=240, pad={top:20,right:20,bottom:32,left:44};
  const cw=width-pad.left-pad.right, ch=height-pad.top-pad.bottom;
  const xs=(i)=>pad.left+(i/(CHART_DATA_VALUES.length-1))*cw;
  const ys=(y)=>pad.top+ch-(y/100)*ch;
  const bandWidth=cw/(data.length-1);

  const linePath = useMemoD(()=>{
    const pts=data.map(p=>({x:xs(p.i),y:ys(p.y)}));
    let path=`M ${pts[0].x} ${pts[0].y}`;
    for(let i=0;i<pts.length-1;i++){
      const p0=pts[Math.max(0,i-1)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(pts.length-1,i+2)];
      path+=` C ${p1.x+(p2.x-p0.x)/6} ${p1.y+(p2.y-p0.y)/6}, ${p2.x-(p3.x-p1.x)/6} ${p2.y-(p3.y-p1.y)/6}, ${p2.x} ${p2.y}`;
    }
    return path;
  },[data]);

  const areaPath = useMemoD(()=>`${linePath} L ${xs(data.length-1)} ${ys(0)} L ${xs(0)} ${ys(0)} Z`,[linePath]);
  const yTicks=[0,25,50,75,100];

  return (
    <div className="relative w-full select-none">
      <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto overflow-visible" onMouseLeave={()=>setHovered(null)}>
        <defs>
          <linearGradient id="fi-area" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#3d81e7" stopOpacity="0.28"/><stop offset="55%" stopColor="#3d81e7" stopOpacity="0.10"/><stop offset="100%" stopColor="#3d81e7" stopOpacity="0"/>
          </linearGradient>
          <linearGradient id="fi-line" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stopColor="#166cca"/><stop offset="50%" stopColor="#3d81e7"/><stop offset="100%" stopColor="#006889"/>
          </linearGradient>
        </defs>
        {data.map(d=>d.isWeekend&&<rect key={`wk-${d.i}`} x={xs(d.i)-bandWidth/2} y={pad.top} width={bandWidth} height={ch} fill="#f1f5f9" opacity={0.5}/>)}
        {yTicks.map(t=>(
          <g key={t}>
            <line x1={pad.left} y1={ys(t)} x2={width-pad.right} y2={ys(t)} stroke="#eef0f2" strokeDasharray="3 5" strokeWidth="1" opacity={t===0?1:0.7}/>
            <text x={pad.left-12} y={ys(t)+4} textAnchor="end" fill="rgba(0,0,0,0.45)" fontSize="10" fontWeight="500">{t}%</text>
          </g>
        ))}
        <path d={areaPath} fill="url(#fi-area)"/>
        <path d={linePath} pathLength={1} fill="none" stroke="url(#fi-line)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{strokeDasharray:1,animation:'drawLine 1.2s ease-out 0.4s both'}}/>
        {data.map(d=>{
          if(!d.outlier) return null;
          const color=d.outlier==='low'?'#d83434':'#3d81e7';
          return <g key={`out-${d.i}`}><circle cx={xs(d.i)} cy={ys(d.y)} r={12} fill={color} opacity={0.15}/><circle cx={xs(d.i)} cy={ys(d.y)} r={6} fill="white" stroke={color} strokeWidth={2.5}/><circle cx={xs(d.i)} cy={ys(d.y)} r={2.5} fill={color}/></g>;
        })}
        {data.map(d=><rect key={`h-${d.i}`} x={xs(d.i)-bandWidth/2} y={pad.top} width={bandWidth} height={ch} fill="transparent" onMouseEnter={()=>setHovered(d.i)} style={{cursor:'crosshair'}}/>)}
        {hovered!==null&&(
          <g>
            <line x1={xs(hovered)} y1={pad.top} x2={xs(hovered)} y2={pad.top+ch} stroke="#3d81e7" strokeOpacity={0.35} strokeDasharray="3 4"/>
            <circle cx={xs(hovered)} cy={ys(data[hovered].y)} r={9} fill="#3d81e7" opacity={0.18}/>
            <circle cx={xs(hovered)} cy={ys(data[hovered].y)} r={5} fill="white" stroke="#3d81e7" strokeWidth={2.5}/>
          </g>
        )}
        {data.filter((_,i)=>i%6===0).map(d=><text key={`xl-${d.i}`} x={xs(d.i)} y={height-14} textAnchor="middle" fill="rgba(0,0,0,0.55)" fontSize="11" fontWeight="500">{d.date}</text>)}
      </svg>
      {hovered!==null&&(
        <div className="absolute pointer-events-none z-10" style={{left:`${(xs(hovered)/width)*100}%`,top:`${(ys(data[hovered].y)/height)*100}%`,transform:'translate(-50%,-140%)'}}>
          <div className="rounded-xl px-3.5 py-2.5 whitespace-nowrap" style={{background:'linear-gradient(135deg,rgba(29,38,48,0.96),rgba(63,78,93,0.96))',backdropFilter:'blur(12px)',boxShadow:'0 12px 32px -8px rgba(29,38,48,0.45)'}}>
            <div className="text-[10px] font-medium uppercase text-white/60 leading-none">{data[hovered].fullDate}</div>
            <div className="flex items-baseline gap-2 mt-1.5">
              <span className="text-[20px] font-semibold text-white leading-none">{data[hovered].y}%</span>
              <span className="text-[10px] text-white/50 uppercase">response rate</span>
            </div>
            {data[hovered].outlier&&(
              <div className="mt-2 pt-2 flex items-center gap-1.5" style={{borderTop:'1px solid rgba(255,255,255,0.1)'}}>
                <span className="inline-block w-1.5 h-1.5 rounded-full" style={{backgroundColor:data[hovered].outlier==='low'?'#d83434':'#3d81e7'}}/>
                <span className="text-[10px] font-semibold uppercase" style={{color:data[hovered].outlier==='low'?'#ff9b9b':'#72a6e8'}}>{data[hovered].outlier==='low'?'Low outlier':'Spike detected'}</span>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------- 4. By Intent ---------- */
const INTENT_ROWS_DATA = [

      </div>
      <div className="px-4 py-3 border-b border-black/10">
        <PanelInsightAccordion expanded={expanded} onToggle={onToggle} collapsed="High-stakes intents respond 2× more than routine calls"
          insightBullets={['Flight Disruption and Baggage Claim drive the highest response — passengers are emotionally invested','Booking Change and Seat Upgrade requests show near-zero engagement delta','General Inquiry sits 17pp below baseline — lowest motivation to respond']}
          expectedImpact={['Prioritizing survey campaigns on disruption intents could add 400+ responses/month','Reducing survey noise on low-intent calls frees up QM review capacity']}

                  <span style={{font:"600 14px/20px var(--font-sans)",color:"var(--color-fg-default)",flexShrink:0}}>{r.pct}%</span>

                  <div className="h-full rounded-full" style={{width:`${r.pct}%`,backgroundColor:barColor,transition:'width 0.3s'}}/>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ---------- 5. By Customer Type ---------- */
const CUSTOMER_ROWS_DATA = [
  {name:'Business Frequent Flyer',pct:73,vs:'+18pp',trend:'↑',tone:'up'},{name:'Leisure Repeat Traveler',pct:61,vs:'+6pp',trend:'→',tone:'flat'},
  {name:'First-Time Traveler',pct:47,vs:'-8pp',trend:'↓',tone:'down'},{name:'Group Booking',pct:31,vs:'-24pp',trend:'→',tone:'down'},
];
function ByCustomerTypePanel({ expanded, onToggle }) {
  return (
    <div className="fi-dash-card bg-white rounded-[12px] overflow-hidden h-full flex flex-col">
      <div className="px-4 py-3 border-b border-black/10 flex items-center justify-between gap-2">
        <div>
          <h3 style={{margin:"0 0 4px",font:"500 14px/20px var(--font-sans)",color:"var(--color-fg-default)"}}>By Customer Type</h3>
          <p style={{margin:0,font:"400 12px/16px var(--font-sans)",color:"var(--color-fg-secondary)"}}>Segment response rate vs. 55.4% baseline</p>
        </div>
      </div>
      <div className="px-4 py-3 border-b border-black/10">
        <PanelInsightAccordion expanded={expanded} onToggle={onToggle} collapsed="Business Frequent Flyers lead — Group Bookings are a structural outlier"
          insightBullets={['Business Frequent Flyers respond 18pp above baseline — consistent across all weeks and channels','Group Bookings are a structural outlier — survey reaches the organizer, not the individual traveler','First-Time Travelers at 47% — one bad experience determines their entire brand perception']}
          expectedImpact={['Redirecting Group Booking surveys to individual travelers could recover 8pp response rate','Targeted re-engagement campaign for First-Time Travelers within 24hrs of journey could lift retention']}
          action="Fix Group Booking survey routing · A/B test First-Time Traveler re-engagement campaign"/>
      </div>
      <div className="p-4 flex-1">
        <div className="space-y-4">
          {CUSTOMER_ROWS_DATA.map(r=>{
            const dotColor=r.tone==='up'?'#3d81e7':r.tone==='flat'?'#72a6e8':r.name==='First-Time Traveler'?'#ff9b9b':'#ffdbdb';
            return (
              <div key={r.name} className="flex items-center gap-3">
                <div className="w-3 h-3 rounded-full flex-shrink-0" style={{backgroundColor:dotColor}}/>
                <div style={{flex:1,font:"400 14px/20px var(--font-sans)",color:"var(--color-fg-default)"}}>{r.name}</div>
                <div style={{font:"600 14px/20px var(--font-sans)",color:"var(--color-fg-default)"}}>{r.pct}%</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ---------- 6. By Channel ---------- */
const CHANNEL_ROWS_DATA = [
  {name:'SMS',pct:71,delta:'+16pp',tone:'up'},{name:'WhatsApp',pct:68,delta:'+13pp',tone:'up'},
  {name:'Email',pct:64,delta:'+9pp',tone:'up'},{name:'Voice IVR',pct:52,delta:'-3pp',tone:'flat'},
  {name:'Web Widget',pct:45,delta:'-10pp',tone:'down'},
];
function ByChannelPanel({ expanded, onToggle }) {
  return (
    <div className="fi-dash-card bg-white rounded-[12px] overflow-hidden h-full flex flex-col">
      <div className="px-4 py-3 border-b border-black/10">
        <h3 style={{margin:"0 0 4px",font:"500 14px/20px var(--font-sans)",color:"var(--color-fg-default)"}}>By Channel</h3>
        <p style={{margin:0,font:"400 12px/16px var(--font-sans)",color:"var(--color-fg-secondary)"}}>Response rate per survey delivery method</p>
      </div>
      <div className="px-4 py-3 border-b border-black/10">
        <PanelInsightAccordion expanded={expanded} onToggle={onToggle} collapsed="SMS leads weekdays · WhatsApp wins on Sundays"
          insightBullets={['SMS leads at 71% but drops to 28% on Sundays — leisure travel day','Web Widget is the lowest performer across every day of the week','WhatsApp at 68% shows strong potential and no weekend drop pattern']}
          expectedImpact={['Shifting Sunday surveys from SMS to WhatsApp could recover 30–40pp on weekend response rate','Removing Web Widget as a primary survey channel reduces delivery failure risk']}
          action="A/B test WhatsApp vs. SMS on Sundays · Deprioritize Web Widget survey delivery"/>
      </div>
      <div className="p-4">
        <div className="space-y-4">
          {CHANNEL_ROWS_DATA.map(r=>{
            const barColor=r.tone==='up'?'#3d81e7':r.tone==='flat'?'#72a6e8':'#ffdbdb';

              <div key={r.name} className="flex flex-col gap-1.5">
                <div className="flex items-center justify-between gap-2">
                  <span style={{font:"400 14px/20px var(--font-sans)",color:"var(--color-fg-default)"}}>{r.name}</span>

                </div>
                <div className="h-[6px] bg-[#f5f7f9] rounded-full overflow-hidden">
                  <div className="h-full rounded-full" style={{width:`${r.pct}%`,backgroundColor:barColor,transition:'width 0.3s'}}/>
