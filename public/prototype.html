  gap: var(--space-3);
}
.tmpl-simple-card {
  display: flex; flex-direction: column; gap: var(--space-2);
  padding: var(--space-4);
  background: var(--lyra-white);
  border: 1.5px solid var(--color-border-subtle);
  border-radius: var(--radius-lg);
  cursor: pointer;
  transition: border-color 0.12s, box-shadow 0.12s;
  user-select: none;
}
.tmpl-simple-card:hover {
  border-color: var(--lyra-brand-300);
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.tmpl-simple-card.selected {
  border-color: var(--lyra-brand-600);
  background: var(--color-bg-active-subtle);
}
.tmpl-simple-card-head {
  display: flex; align-items: center; gap: var(--space-2);
}
.tmpl-simple-card-name {
  font: 500 14px/20px var(--font-sans);
  color: var(--color-fg-default);
  flex: 1;
}
.tmpl-simple-card-why {
  margin: 0;
  font: var(--text-body-sm); letter-spacing: 0.01rem;
  color: var(--color-fg-secondary);
}

/* Template picker — split panel inside form step (legacy, kept for reference) */
.tmpl-picker {
  display: flex;
  border: 1px solid var(--color-border-subtle);
  border-radius: var(--radius-lg);
  overflow: hidden;
  min-height: 340px;
  background: var(--lyra-white);
}
.tmpl-list {
  width: 240px;
  flex-shrink: 0;
  border-right: 1px solid var(--color-border-subtle);
  display: flex;
  flex-direction: column;
  background: var(--lyra-slate-50);
}
.tmpl-list-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px;
  cursor: pointer;
  border-bottom: 1px solid var(--color-border-subtle);
  transition: background 0.1s;
  user-select: none;
}
.tmpl-list-item:hover,
.tmpl-list-item.previewing {
  background: var(--lyra-white);
}
.tmpl-list-item.sel {
  background: var(--color-bg-active-subtle);
  box-shadow: inset 2px 0 0 var(--lyra-brand-600);
}
.tmpl-list-name {
  font: 500 13px/18px var(--font-sans);
  color: var(--color-fg-default);
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.tmpl-list-scratch {
  padding: 10px 14px;
  margin-top: auto;
  border-top: 1px solid var(--color-border-subtle);
}
.tmpl-detail {
  flex: 1;
  padding: var(--space-4);
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
  overflow-y: auto;
  background: var(--lyra-white);
}
.tmpl-detail-head {
  display: flex; align-items: flex-start; gap: var(--space-3);
}
.tmpl-detail-name {
  font: 600 16px/24px var(--font-sans);
  color: var(--color-fg-default);
  letter-spacing: -0.01rem;
}
.tmpl-detail-tags-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-4);
}
.tmpl-detail-meta {
  display: flex;
  gap: var(--space-5);
  padding: var(--space-3) var(--space-4);
  background: var(--lyra-slate-50);
  border: 1px solid var(--color-border-subtle);
  border-radius: var(--radius-md);
}
.tmpl-meta-item {
  display: flex; flex-direction: column; gap: 3px;
}
.tmpl-meta-label {
  font: var(--text-h-xs);
  color: var(--color-fg-secondary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.tmpl-meta-value {
  font: 600 14px/20px var(--font-sans);
  color: var(--color-fg-default);
}

.tmpl-card {
  background: var(--lyra-white);
  border: 1px solid var(--color-border-subtle);
  border-radius: var(--radius-lg);
  display: flex;
  flex-direction: column;
  gap: var(--space-4);
  padding: var(--space-4);
  transition: border-color 0.15s;
}
.tmpl-card:hover {
  border-color: var(--lyra-brand-300);
}

.tmpl-card-top {
  display: flex;
  align-items: flex-start;
  gap: var(--space-3);
}

.tmpl-icon {
  width: 40px; height: 40px;
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.tmpl-icon svg { width: 20px; height: 20px; }

.tmpl-category {
  font: 500 11px/16px var(--font-sans);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 2px;
}

.tmpl-name {
  font: 600 15px/20px var(--font-sans);
  color: var(--color-fg-default);
  letter-spacing: -0.01em;
}

.tmpl-effort-badge {
  flex-shrink: 0;
  align-self: flex-start;
  font: 500 11px/16px var(--font-sans);
  padding: 2px var(--space-2);
  border-radius: var(--radius-round);
  white-space: nowrap;
}

/* "Use when" — primary decision signal */
.tmpl-use-when {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: var(--space-2) var(--space-3);
  background: var(--color-bg-active-subtle);
  border-left: 2px solid var(--lyra-brand-400);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}
.tmpl-use-when-label {
  font: var(--text-h-xs); font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--color-fg-active-strong);
}
.tmpl-use-when-text {
  font: var(--text-body-sm); letter-spacing: 0.01rem;
  color: var(--color-fg-default);
}

.tmpl-tags-section {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.tmpl-tags-label {
  font: var(--text-h-xs);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--lyra-slate-400);
}

.tmpl-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.tmpl-tag {
  font: var(--text-body-sm);
  padding: 2px var(--space-2);
  border-radius: var(--radius-round);
}
.tmpl-tag.interaction {
  background: var(--lyra-slate-100);
  color: var(--lyra-slate-700);
  border: 1px solid var(--lyra-slate-200);
}
.tmpl-tag.topic {
  background: var(--fi-purple-bg);
  color: var(--lyra-purple-700);
  border: 1px solid rgba(120,86,186,0.15);
}

.tmpl-card-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-2);
  margin-top: auto;
  padding-top: var(--space-3);
  border-top: 1px solid var(--color-border-subtle);
}

.tmpl-foot-hint {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font: 400 12px/16px var(--font-sans);
  color: var(--lyra-slate-400);
}

.tmpl-use-btn {
  display: inline-flex; align-items: center; gap: 6px;
  height: 32px; padding: 0 var(--space-4);
  background: var(--color-bg-primary);
  color: var(--lyra-white);
  border: none; border-radius: var(--radius-sm);
  font: 500 13px/20px var(--font-sans);
  cursor: pointer;
  transition: background 0.12s;
}
.tmpl-use-btn:hover { background: var(--color-bg-primary-hover); }

.tmpl-filter-pill {
  height: 30px; padding: 0 var(--space-3);
  background: var(--lyra-white);
  border: 1px solid var(--color-border-soft);
  border-radius: var(--radius-round);
  font: var(--text-body-sm); letter-spacing: 0.01rem;
  color: var(--lyra-slate-600);
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
}
.tmpl-filter-pill:hover {
  background: var(--color-bg-active-subtle);
  border-color: var(--lyra-brand-400);
  color: var(--color-fg-active-strong);
}
.tmpl-filter-pill.on {
  background: var(--color-bg-active-moderate);
  border-color: var(--lyra-brand-500);
  color: var(--color-fg-active-strong);
  font-weight: 500;
}

/* Readonly checked checkbox — shows check but signals non-editable */
.lyra-check.disabled input[type="checkbox"]:disabled:checked {
  background: var(--color-bg-active-moderate);
  border-color: var(--lyra-brand-400);
  background-image: url("data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%2016%2016%27%20fill%3D%27none%27%3E%3Cpath%20d%3D%27M3.5%208L6.5%2011L12.5%205%27%20stroke%3D%27%23185ba4%27%20stroke-width%3D%272%27%20stroke-linecap%3D%27round%27%20stroke-linejoin%3D%27round%27%2F%3E%3C%2Fsvg%3E");
  background-repeat: no-repeat;
  background-position: center;
  opacity: 1;
  cursor: default;
}

/* ─── Tooltip ────────────────────────────────────────────────────────────── */
.tooltip-wrap { display: inline-flex; position: relative; }
.tooltip-bubble {
  display: none;
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%; transform: translateX(-50%);
  background: var(--color-bg-surface-inverse);
  color: var(--color-fg-inverse);
  font: 400 12px/18px var(--font-sans);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-md);
  box-shadow: var(--elev-3);
  white-space: normal;
  z-index: 500;
  pointer-events: none;
}
.tooltip-bubble::after {
  content: "";
  position: absolute;
  top: 100%; left: 50%; transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: var(--color-bg-surface-inverse);
}
.tooltip-wrap:hover .tooltip-bubble { display: block; }

/* ─── Topic AI Model &amp; Survey Template combined section sub-sections ───────────────── */
.intel-sub-section {
  display: flex; flex-direction: column; gap: var(--space-3);
}
.intel-sub-section > .form-section-head {
  margin-left: calc(-1 * var(--space-6));
  margin-right: calc(-1 * var(--space-6));
}
.intel-sub-section + .intel-sub-section {
  padding-top: var(--space-4);
  margin-top: var(--space-4);
}
.intel-sub-label {
  display: flex; align-items: center; gap: var(--space-2);
  font: 500 13px/20px var(--font-sans);
  color: var(--color-fg-default);
  letter-spacing: 0;
}
.intel-sub-label svg { flex-shrink: 0; color: var(--color-fg-secondary); }

/* ─── Selected model summary (compact inline card in Section 4) ──────────── */
.selected-model-summary {
  border: 1.5px solid var(--lyra-brand-600);
  border-radius: var(--radius-lg);
  background: var(--lyra-white);
  box-shadow: 0px 1px 2px 0px rgba(16,24,40,0.06), 0px 0px 0px 3px var(--color-bg-active-moderate);
}
.selected-model-summary-inner {
  display: flex; align-items: flex-start; gap: var(--space-4);
  padding: var(--space-5);
}

/* Model badge (Recommended / New) */
.model-badge {
  display: inline-flex; align-items: center;
  font: var(--text-h-xs);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--lyra-purple-700);
  background: var(--fi-purple-bg);
  border: 1px solid rgba(120,86,186,0.20);
  padding: 1px 6px;
  border-radius: var(--radius-round);
  white-space: nowrap;
}

/* ─── Model Picker Drawer ─────────────────────────────────────────────────── */
.model-picker-drawer {
  width: 680px;
  height: 100%;
  background: var(--lyra-white);
  display: flex; flex-direction: column;
  border-left: 1px solid var(--color-border-subtle);
  animation: drawerSlideIn 0.2s ease;
}

.model-picker-head {
  display: flex; align-items: flex-start; gap: var(--space-3);
  padding: var(--space-5) var(--space-6);
  border-bottom: 1px solid var(--color-border-subtle);
  flex-shrink: 0;
}

.model-picker-search-wrap {
  display: flex; align-items: center; gap: var(--space-2);
  margin: var(--space-4) var(--space-6) 0;
  padding: 0 var(--space-3);
  height: 36px;
  border: 1px solid var(--color-border-soft);
  border-radius: var(--radius-md);
  background: var(--lyra-white);
  flex-shrink: 0;
}
.model-picker-search-wrap:focus-within {
  border-color: var(--color-fg-active-strong);
  box-shadow: 0 0 1px 3px rgba(44,138,242,0.20);
}
.model-picker-search {
  flex: 1; border: none; outline: none; background: transparent;
  font: 400 14px/20px var(--font-sans); color: var(--color-fg-default);
}
.model-picker-search::placeholder { color: var(--color-fg-secondary); }
.model-picker-search-clear {
  background: none; border: none; cursor: pointer; padding: 2px;
  color: var(--color-fg-secondary); border-radius: var(--radius-xs);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.model-picker-search-clear:hover { background: var(--color-bg-control-subtle); color: var(--color-fg-default); }

.model-picker-count {
  padding: var(--space-2) var(--space-6) var(--space-3);
  font: 400 12px/16px var(--font-sans);
  color: var(--color-fg-secondary);
  flex-shrink: 0;
}

.model-picker-list {
  flex: 1; overflow-y: auto;
  padding: 0 var(--space-6) var(--space-4);
  display: flex; flex-direction: column; gap: var(--space-2);
  scrollbar-width: thin;
  scrollbar-color: var(--color-border-medium) transparent;
}

.model-picker-row {
  border: 1.5px solid var(--color-border-subtle);
  border-radius: var(--radius-lg);
  background: var(--lyra-white);
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.model-picker-row:hover { border-color: var(--lyra-brand-300); background: var(--color-bg-active-subtle); }
.model-picker-row.selected { border-color: var(--lyra-brand-600); background: var(--color-bg-active-subtle); }

.model-picker-row-head {
  display: flex; align-items: flex-start; gap: var(--space-3);
  padding: var(--space-4) var(--space-4);
}

.model-picker-row-details {
  padding: var(--space-4) var(--space-4) var(--space-4) 60px; /* left-indent to align under text, past radio+icon */
  border-top: 1px solid var(--color-border-subtle);
  background: var(--lyra-slate-50);
}

.model-details-label {
  font: var(--text-h-xs);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--color-fg-secondary);
  margin-bottom: var(--space-3);
}

/* Horizontal grid — one column per category */
.model-details-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: var(--space-3);
}

.model-details-cell {
  background: var(--lyra-white);
  border: 1px solid var(--color-border-subtle);
  border-radius: var(--radius-md);
  overflow: hidden;
}

.model-details-cell-head {
  padding: var(--space-2) var(--space-3);
  font: 500 11px/16px var(--font-sans);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--color-fg-active-strong);
  background: var(--color-bg-active-subtle);
  border-bottom: 1px solid var(--color-border-subtle);
}

.model-details-cell-intents {
  padding: var(--space-2) var(--space-3) var(--space-3);
  display: flex; flex-direction: column; gap: 6px;
}

.model-details-intent-row {
  display: flex; align-items: center; gap: var(--space-2);
  font: var(--text-body-sm); letter-spacing: 0.01rem;
  color: var(--color-fg-default);
}

.model-details-intent-dot {
  width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
  background: var(--lyra-purple-500);
  opacity: 0.7;
}

.model-picker-foot {
  display: flex; align-items: center; justify-content: flex-end; gap: var(--space-3);
  padding: var(--space-4) var(--space-6);
  border-top: 1px solid var(--color-border-subtle);
  flex-shrink: 0;
  background: var(--lyra-white);
}

/* ─── Selectable card (AI Model + Survey Design sections) ─────────────────── */
.selectable-card {
  border: 1.5px solid var(--color-border-subtle);
  border-radius: var(--radius-lg);
  background: var(--lyra-white);
  overflow: hidden;
  transition: border-color 0.15s;
  cursor: pointer;
}
.selectable-card:hover { border-color: var(--lyra-brand-300); }
.selectable-card.selected {
  border-color: var(--lyra-brand-600);
  background: var(--color-bg-active-subtle);
}
.selectable-card + .selectable-card { margin-top: var(--space-3); }

.selectable-card-head {
  display: flex; align-items: flex-start; gap: var(--space-3);
  padding: var(--space-4);
}

.selectable-card-details {
  padding: var(--space-3) var(--space-4) var(--space-4);
  border-top: 1px solid var(--color-border-subtle);
  background: var(--lyra-slate-50);
  display: flex; flex-direction: column; gap: var(--space-3);
}

/* Lyra radio button — custom circle indicator */
.lyra-radio {
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  width: 16px; height: 16px;
  border-radius: 50%;
  border: 1.5px solid rgba(0,0,0,0.30);
  background: var(--lyra-white);
  margin-top: 3px;
  position: relative;
  transition: border-color 0.15s;
}
.lyra-radio.selected {
  border-color: var(--lyra-brand-600);
}
.lyra-radio.selected::after {
  content: "";
  position: absolute;
  inset: 3px;
  border-radius: 50%;
  background: var(--lyra-brand-600);
}

/* View details toggle button */
.view-details-btn {
  display: inline-flex; align-items: center; gap: 4px;
  height: 28px; padding: 0 var(--space-2);
  background: transparent; border: none;
  font: 500 12px/16px var(--font-sans);
  color: var(--color-fg-action);
  cursor: pointer;
  border-radius: var(--radius-sm);
  white-space: nowrap;
  flex-shrink: 0;
  transition: background 0.1s;
}
.view-details-btn:hover { background: var(--color-bg-active-subtle); }

/* Category + intent rows inside expanded card detail panel */
.model-category-row {
  display: flex; flex-direction: column; gap: var(--space-1);
}
.model-category-row + .model-category-row {
  padding-top: var(--space-2);
  border-top: 1px solid var(--color-border-subtle);
}
.model-category-label {
  font: 500 11px/16px var(--font-sans);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--color-fg-secondary);
}

/* Dashboard card borders — Lyra border.soft token */
.fi-dash-card { border: 1px solid rgba(0,0,0,0.10) !important; }

/* Dashboard AI insight sections — Lyra brand.500 at low opacity */
.fi-ai-section {
  background: rgba(61,129,231,0.06) !important;   /* brand.500 @6% — very light blue wash */
  border: none !important;
  border-radius: 8px;
  overflow: hidden;
}

/* New campaign row — highlight fades out after 2.5s */
@keyframes newRowFade {
  0%, 60% { background: var(--lyra-brand-50); }
  100%     { background: transparent; }
}
.new-campaign-row { animation: newRowFade 3s ease 0.3s both; }

/* Campaign activation success overlay */
@keyframes overlayIn  { from { opacity: 0 } to { opacity: 1 } }
@keyframes cardIn     { from { opacity: 0; transform: scale(0.88) translateY(12px) } to { opacity: 1; transform: scale(1) translateY(0) } }
@keyframes ringPop    { 0% { transform: scale(0.6); opacity: 0 } 60% { transform: scale(1.08) } 100% { transform: scale(1); opacity: 1 } }
@keyframes checkDraw  { from { stroke-dashoffset: 40 } to { stroke-dashoffset: 0 } }
@keyframes labelIn    { from { opacity: 0; transform: translateY(8px) } to { opacity: 1; transform: translateY(0) } }
.activate-overlay {
  position: fixed; inset: 0; z-index: 1200;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.40);
  animation: overlayIn 0.2s ease both;
}
.activate-card {
  background: var(--lyra-white);
  border-radius: 20px;
  padding: 48px 56px;
  text-align: center;
  box-shadow: 0px 24px 48px -12px rgba(0,0,0,0.22);
  animation: cardIn 0.35s cubic-bezier(0.22,1,0.36,1) 0.05s both;
  min-width: 400px;
}
.activate-ring {
  width: 80px; height: 80px; border-radius: 50%;
  background: var(--lyra-green-50);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 24px;
  animation: ringPop 0.45s cubic-bezier(0.22,1,0.36,1) 0.2s both;
}
.activate-check {
  stroke-dasharray: 40;
  stroke-dashoffset: 40;
  animation: checkDraw 0.4s ease 0.55s both;
}
.activate-title {
  font: 600 20px/28px var(--font-sans);
  color: var(--color-fg-default);
  margin: 0 0 8px;
  animation: labelIn 0.3s ease 0.45s both;
}
.activate-sub {
  font: 400 14px/20px var(--font-sans);
  color: var(--color-fg-secondary);
  margin: 0;
  animation: labelIn 0.3s ease 0.55s both;
}

@keyframes drawLine {
  from { stroke-dashoffset: 1; }
  to   { stroke-dashoffset: 0; }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0);   }
}

</style>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { corePlugins: { preflight: false } }</script>

<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
/* Lyra Shell (React port) — topbar + left nav + app-switcher dropdown. */

/* Lyra brand mark — the official "Union" smile from Lyra Foundations.
   Renders Figma's PNG asset first (pixel-perfect to the design); falls back to
   a hand-drawn asymmetric SVG approximation if the asset URL doesn't load. */
const LYRA_SMILE_URL = "https://www.figma.com/api/mcp/asset/23309042-4af8-493a-abdb-6b9c4cd978d6";

function LyraSmile() {
  const [errored, setErrored] = React.useState(false);
  if (!errored) {
    return (
      <img src={LYRA_SMILE_URL} alt="" width="24" height="24"
        style={{ display: "block" }}
        onError={() => setErrored(true)}/>
    );
  }
  /* Fallback: asymmetric Lyra smile — two close-together eyes upper-left,
     one continuous curve flowing down and curling up to the right. */
  return (
    <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true" fill="currentColor">
      <circle cx="5" cy="6" r="2.2"/>
      <circle cx="10.5" cy="6" r="2.2"/>
      <path d="M2.5 11 C 4 17.5, 10 20.5, 16 18 C 19.5 16.5, 22 13, 22.5 9"
        fill="none" stroke="currentColor" strokeWidth="2.8"
        strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

/* Backward-compat: existing code references SMILE_SVG */
const SMILE_SVG = <LyraSmile/>;

function Chev({ rot = 0 }) {
  return (
    <svg className="chev" viewBox="0 0 16 16" style={{ transform: `rotate(${rot}deg)` }}>
      <path d="M3.5 6 8 10.5 12.5 6" stroke="currentColor" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

function Topbar({ product, productAccent, onProductClick, onAppSwitcherClick }) {
  return (
    <div className="topbar">
      {/* Lyra _shellbar/app name (node 20232:24572): one unified pill containing
          smile + product name + chevron — the whole thing is the click target. */}
      <div className={`app-title ${productAccent || ""}`} onClick={onProductClick}>
        <div className="brand-mark" style={{ color: "var(--lyra-brand-500)" }}>{SMILE_SVG}</div>
        <span>{product}</span>
        {productAccent === "fi" ? <span className="fi-chip">AI</span> : null}
        <Chev/>
      </div>
      {/* Lyra Utilities slot2 (node 17643:44156): 3 service icons grouped tight, then 8px gap to profile */}
      <div className="topbar-utilities">
        <div className="hdr-icon-group">
          <div className="hdr-icon" title="Help">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 0 1 5 .5c0 1.5-2 2.2-2.5 3.2"/><circle cx="12" cy="16.5" r=".6" fill="currentColor"/></svg>
          </div>
          <div className="hdr-icon" title="Notifications">
            <svg viewBox="0 0 24 24"><path d="M6 9a6 6 0 0 1 12 0c0 5 2.5 7 2.5 7H3.5S6 14 6 9z"/><path d="M10 20a2 2 0 0 0 4 0"/></svg>
            <span className="dot-badge">3</span>
          </div>
        </div>
        <div className="hdr-avatar">
          <div className="ava">MC</div>
          <Chev/>
        </div>
      </div>
    </div>
  );
}

const NAV_ICONS = {
  campaigns: <path d="M3 11l18-7v16l-18-7v-2z M7 13v5"/>,
  insights:  <path d="M3 17l4-4 4 4 6-7 4 4 M14 10h4v4"/>,
  topics:    <path d="M21 12a8 8 0 1 1-3-6.2L21 4v6h-6"/>,
  responses: <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z M8 9h8 M8 13h5"/>,
  alerts:    <path d="M6 9a6 6 0 0 1 12 0c0 5 2.5 7 2.5 7H3.5S6 14 6 9z M10 20a2 2 0 0 0 4 0"/>,
  settings:  <path d="M12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6z M19 12a7 7 0 0 0-.1-1.2l2.1-1.6-2-3.5-2.5 1a7 7 0 0 0-2-1.2L14 3h-4l-.5 2.5a7 7 0 0 0-2 1.2l-2.5-1-2 3.5L5.1 10.8A7 7 0 0 0 5 12c0 .4 0 .8.1 1.2l-2.1 1.6 2 3.5 2.5-1a7 7 0 0 0 2 1.2L10 21h4l.5-2.5a7 7 0 0 0 2-1.2l2.5 1 2-3.5-2.1-1.6c.1-.4.1-.8.1-1.2z"/>,
  dashboard: <path d="M4 4h7v7H4z M13 4h7v7h-7z M4 13h7v7H4z M13 13h7v7h-7z"/>,
};

function NavIcon({ name }) {
  return (
    <svg className="ico" viewBox="0 0 24 24">
      {NAV_ICONS[name] || NAV_ICONS.campaigns}
    </svg>
  );
}

function LeftNav({ items, onLeafClick, minimized = false, onToggleMinimized }) {
  const [collapsed, setCollapsed] = React.useState({});
  return (
    <div className={`nav${minimized ? " minimized" : ""}`}>
      <div className="nav-collapse" title={minimized ? "Expand" : "Collapse"}
        onClick={onToggleMinimized}>
        <svg viewBox="0 0 24 24" style={{ transform: minimized ? "rotate(180deg)" : "none" }}>
          <polyline points="15 18 9 12 15 6"
            stroke="currentColor" strokeWidth="1.8" fill="none"
            strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </div>
      <div className="nav-scroll">
        {items.map((it, i) => {
          if (it.type === "group") {
            const isCol = collapsed[i] ?? !it.expanded;
            return (
              <React.Fragment key={i}>
                <div className={`nav-item ${isCol ? "collapsed" : ""}`}
                  title={minimized ? it.label : undefined}
                  onClick={() => setCollapsed({ ...collapsed, [i]: !isCol })}>
                  <NavIcon name={it.icon}/>
                  <span className="nav-label">{it.label}</span>
                  <Chev/>
                </div>
                <div className={`nav-children ${isCol ? "hidden" : ""}`}>
                  {(it.children || []).map((c, j) => (
                    <div key={j}
                      className={`nav-leaf ${c.active ? "active" : ""}`}
                      title={minimized ? c.label : undefined}
                      onClick={() => onLeafClick && onLeafClick(c)}>
                      <span className="nav-label">{c.label}</span>
                      {c.isNew ? <span className="nav-new-dot" title="New"/> : null}
                    </div>
                  ))}
                </div>
              </React.Fragment>
            );
          }
          return (
            <div key={i}
              className={`nav-item ${it.active ? "active" : ""}`}
              title={minimized ? it.label : undefined}
              onClick={() => onLeafClick && onLeafClick(it)}>
              <NavIcon name={it.icon}/>
              <span className="nav-label">{it.label}</span>
              {it.isNew ? <span className="nav-new-dot" title="New"/> : null}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// Lyra-styled "Feedback Intelligence" product icon: a chat bubble with a sparkle.
function FIProductIcon({ size = 18 }) {
  return (
    <svg className="ico" viewBox="0 0 24 24" width={size} height={size}>
      <defs>
        <linearGradient id="fiGrad" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
          <stop offset="0" stopColor="var(--fi-accent)"/>
          <stop offset="1" stopColor="var(--lyra-purple-500)"/>
        </linearGradient>
      </defs>
      <path d="M4 5h13a3 3 0 0 1 3 3v6a3 3 0 0 1-3 3h-5l-5 4v-4H4a0 0 0 0 1 0 0V8a3 3 0 0 1 3-3z"

function Sparkline({ seed = 1, color = "var(--fi-accent)" }) {
  // Deterministic pseudo-random sparkline.
  const pts = [];
  let x = seed * 17;
  for (let i = 0; i < 14; i++) {
    x = (x * 9301 + 49297) % 233280;
    pts.push(8 + (x % 14));
  }
  const max = Math.max(...pts), min = Math.min(...pts);
  const d = pts.map((p, i) => {
    const xi = (i / (pts.length - 1)) * 80;
    const yi = 22 - ((p - min) / (max - min || 1)) * 18;
    return `${i === 0 ? "M" : "L"}${xi.toFixed(1)} ${yi.toFixed(1)}`;
  }).join(" ");
  return (
    <svg className="spark" viewBox="0 0 80 22">
      <path d={d} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

/* Reusable Lyra filter chip with click-outside dropdown menu.
   Renders as: [Label] [: Value] [▾]  [×] when active, or [Label ▾] when empty. */
function FilterChip({ label, value, options, onSelect, onClear }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  const isActive = value != null && value !== "";

  React.useEffect(() => {
    if (!open) return;
    function onDocClick(e) {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    }
    document.addEventListener("mousedown", onDocClick);
    return () => document.removeEventListener("mousedown", onDocClick);
  }, [open]);

  return (
    <div className={`filter-chip ${isActive ? "active" : "muted"}`} ref={ref}>
      <span className="filter-chip-trigger" onClick={() => setOpen(o => !o)}>
        <span>{label}{isActive ? ":" : ""}</span>
        {isActive && <span className="filter-chip-value">{value}</span>}
        <svg className="chev" viewBox="0 0 16 16">
          <polyline points="4 6 8 10 12 6" stroke="currentColor" strokeWidth="1.5"
            fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </span>
      {isActive && (
        <button className="filter-chip-x" onClick={onClear} title={`Remove ${label} filter`}>
          <svg viewBox="0 0 16 16">
            <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" strokeLinecap="round"/>
          </svg>
        </button>
      )}
      {open && (
        <div className="filter-chip-menu">
          {options.map(opt => (
            <button key={opt}
              className={`filter-chip-menu-item ${opt === value ? "selected" : ""}`}
              onClick={() => { onSelect(opt); setOpen(false); }}>
              {opt}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function SurveyCampaignsGrid({ onCreate, onOpen, newCampaigns = [] }) {
  const [search, setSearch] = React.useState("");
  const [statusFilter, setStatusFilter] = React.useState(null);   // null = no filter (show all)
  const [order, setOrder] = React.useState(() => CAMPAIGNS.map(c => c.id));
  const [selectedIds, setSelectedIds] = React.useState(() => new Set());
  const [priorityModalOpen, setPriorityModalOpen] = React.useState(false);
  const [modalOrder, setModalOrder] = React.useState([]);
  const [modalDragId, setModalDragId] = React.useState(null);
  const [modalDropBeforeId, setModalDropBeforeId] = React.useState(null);
  const [statusOverride, setStatusOverride] = React.useState({}); // id -> status
  const [deletedIds, setDeletedIds] = React.useState(() => new Set());

  const statusOf = (c) => statusOverride[c.id] || c.status;
  const toggleSelect = (id) => setSelectedIds(prev => {
    const next = new Set(prev);
    next.has(id) ? next.delete(id) : next.add(id);
    return next;
  });
  const clearSelection = () => setSelectedIds(new Set());
  const selCount = selectedIds.size;
  const selectedRows = () => [...selectedIds].map(id => CAMPAIGNS.find(c => c.id === id)).filter(Boolean);
  const canActivate = selCount > 0 && selectedRows().some(c => statusOf(c) !== "active" && statusOf(c) !== "expired");
  const canDeactivate = selCount > 0 && selectedRows().some(c => statusOf(c) === "active");
  const canDelete = selCount > 0;
  const bulkSetStatus = (status) => {
    setStatusOverride(prev => {
      const next = { ...prev };
      selectedRows().forEach(c => {
        if (status === "active" && statusOf(c) === "expired") return;
        next[c.id] = status;
      });
      return next;
    });
    clearSelection();
  };
  const bulkDelete = () => {
    setDeletedIds(prev => {
      const next = new Set(prev);
      selectedIds.forEach(id => next.add(id));
      return next;
    });
    clearSelection();
  };

  const rowActivate = (id) => setStatusOverride(prev => ({ ...prev, [id]: "active" }));
  const rowDeactivate = (id) => setStatusOverride(prev => ({ ...prev, [id]: "inactive" }));
  const rowDelete = (id) => {
    const c = CAMPAIGNS.find(x => x.id === id);
    if (!window.confirm(`Delete "${c?.name}"? This cannot be undone.`)) return;
    setDeletedIds(prev => { const next = new Set(prev); next.add(id); return next; });
    setSelectedIds(prev => { const next = new Set(prev); next.delete(id); return next; });
  };

  // Routing-active = active + paused. Draft/Ended don't participate in priority.
  const isRouting = c => {
    if (deletedIds.has(c.id)) return false;
    const s = statusOf(c);
    return s === "active" || s === "inactive";
  };
  const allCampaignPool = [...newCampaigns, ...CAMPAIGNS];
  const orderedAll = [...order.map(id => CAMPAIGNS.find(c => c.id === id)).filter(Boolean), ...newCampaigns];
  const priorityMap = {};
  let p = 0;
  orderedAll.forEach(c => { if (isRouting(c)) { p++; priorityMap[c.id] = p; } });

  function openPriorityModal() {
    const routingIds = orderedAll.filter(c => isRouting(c)).map(c => c.id);
    setModalOrder(routingIds);
    setPriorityModalOpen(true);
  }
  function modalReorder(srcId, beforeId) {
    if (srcId === beforeId) return;
    const next = modalOrder.filter(id => id !== srcId);
    if (beforeId == null) next.push(srcId);
    else { const i = next.indexOf(beforeId); next.splice(i, 0, srcId); }
    setModalOrder(next);
  }
  function handleSaveModal() {
    setOrder([...modalOrder, ...order.filter(id => !modalOrder.includes(id))]);
    setPriorityModalOpen(false);
  }

  const liveCampaigns = [...newCampaigns, ...CAMPAIGNS].filter(c => !deletedIds.has(c.id));
  const statusOptions = ["Active", "Inactive", "Expired"];
  const hasAnyFilter = !!(search || statusFilter);
  const clearAllFilters = () => { setSearch(""); setStatusFilter(null); };

  const [sortKey, setSortKey] = React.useState("updated");
  const [sortDir, setSortDir] = React.useState("desc");

  function toggleSort(key) {
    if (sortKey === key) setSortDir(d => d === "asc" ? "desc" : "asc");
    else { setSortKey(key); setSortDir("asc"); }
  }

  const STATUS_ORDER = { active: 0, inactive: 1, expired: 2 };

  const filteredRows = orderedAll.filter(c => {
    if (deletedIds.has(c.id)) return false;
    const s = statusOf(c);
    const filterVal = statusFilter === "Inactive" ? "inactive" : statusFilter === "Expired" ? "expired" : statusFilter?.toLowerCase();
    if (filterVal && s !== filterVal) return false;
    if (search && !c.name.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const rows = [...filteredRows].sort((a, b) => {
    let av, bv;
    if (sortKey === "updated")  { av = a.updated;                bv = b.updated; }
    if (sortKey === "priority") {
      const activeOnly = c => statusOf(c) === "active";
      av = activeOnly(a) ? (priorityMap[a.id] ?? 999) : 999;
      bv = activeOnly(b) ? (priorityMap[b.id] ?? 999) : 999;
    }
    if (sortKey === "endDate")  { av = a.endDate ?? "zzz";       bv = b.endDate ?? "zzz"; }
    if (av === undefined) return 0;
    if (av < bv) return sortDir === "asc" ? -1 : 1;
    if (av > bv) return sortDir === "asc" ? 1 : -1;
    return 0;
  });

  const allRowsSelected = rows.length > 0 && rows.every(r => selectedIds.has(r.id));

        {(!active || sortDir === "desc") && <polyline points="4 6 8 10 12 6"  style={{ opacity: active && sortDir === "desc" ? 1 : 0.4 }}/>}
      </svg>
    );
  };

          Survey Campaigns

            borderRadius: "var(--radius-round)",

            font: "500 12px/16px var(--font-sans)", letterSpacing: "0.01rem",
          }}>{rows.length}</span>
        </h1>
        <div className="head-actions">
          <button className="btn" onClick={openPriorityModal}>
            Set Priority for Campaigns
          </button>
          <button className="btn primary" onClick={onCreate}>
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Create Campaign
          </button>
        </div>
      </div>

      {/* Lyra Filter Bar — Search on the left, filter chips, then Clear */}
      <div className="toolbar" style={{ paddingTop: 14 }}>
        <div className="search">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <input placeholder="Search campaigns"
            value={search} onChange={e => setSearch(e.target.value)}/>
        </div>
        <FilterChip label="Status" value={statusFilter} options={statusOptions}
          onSelect={setStatusFilter} onClear={() => setStatusFilter(null)}/>
        {hasAnyFilter && (
          <button className="clear-link" onClick={clearAllFilters}>Clear</button>

      <div className="table-wrap">

            </tr>
          </thead>

                <tr key={c.id} className={c.isNew ? "new-campaign-row" : ""}>
                  <td>
                    {showPriority ? (
                      /* Priority badge — bold so it's recognizable as main grid text (per Lyra instructions).

                      <div style={{
                        display: "inline-flex", alignItems: "center", justifyContent: "center",
                        minWidth: 28, height: 24, padding: "0 var(--space-2)", borderRadius: 6,
                        background: "var(--color-bg-active-moderate)",   /* Lyra: #d3e6fd */
                        color: "var(--color-fg-active-strong)",          /* Lyra: brand-700 */
                        font: "600 14px/20px var(--font-sans)", letterSpacing: 0,   /* Lyra Heading-sm bold */

                  <td>
                    <div>{c.updated}</div>
                    <div style={{ font: "400 12px/16px var(--font-sans)", color: "var(--color-fg-secondary)", marginTop: 4 }}>
                      by {c.owner}
                    </div>
                  </td>
                  <td>
                    <StatusPill s={statusOf(c)}/>
                  </td>
                  <td style={{ textAlign: "center" }}>
                    <RowActions
                      campaign={c}
                      statusOf={statusOf}
                      onActivate={rowActivate}
                      onDeactivate={rowDeactivate}

          <div className="ly-modal" onClick={e => e.stopPropagation()}>
            <div className="ly-modal-head">
              <div className="ly-modal-title">Prioritise Campaigns</div>
              <button className="ly-modal-close" onClick={() => setPriorityModalOpen(false)}>
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" strokeWidth="2" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>

              <div className="ly-modal-desc">
                Drag rows to set routing priority. When an interaction matches multiple campaigns, the lower-numbered campaign wins.
              </div>
              <table className="priority-modal-table">
                <thead>
                  <tr>
                    <th style={{ width: 36, padding: 0 }}></th>
                    <th style={{ width: 130 }}>Priority</th>
                    <th>Campaign</th>
                    <th>Channels</th>
                  </tr>
                </thead>
                <tbody>
                  {modalOrder.map((id, idx) => {
                    const c = CAMPAIGNS.find(x => x.id === id);
                    if (!c) return null;
                    const isDragging = modalDragId === id;
                    const dropAbove = modalDropBeforeId === id;
                    return (
                      <tr key={id}
                        draggable
                        onDragStart={e => {
                          setModalDragId(id);
                          e.dataTransfer.effectAllowed = "move";
                          e.dataTransfer.setData("text/plain", String(id));
                        }}
                        onDragOver={e => {
                          if (modalDragId == null) return;
                          e.preventDefault();
                          e.dataTransfer.dropEffect = "move";
                          const rect = e.currentTarget.getBoundingClientRect();
                          const above = (e.clientY - rect.top) < rect.height / 2;
                          setModalDropBeforeId(above ? id : (modalOrder[idx + 1] ?? null));
                        }}
                        onDrop={e => {
                          e.preventDefault();
                          if (modalDragId != null) modalReorder(modalDragId, modalDropBeforeId);
                          setModalDragId(null);
                          setModalDropBeforeId(null);
                        }}
                        onDragEnd={() => { setModalDragId(null); setModalDropBeforeId(null); }}
                        style={{
                          opacity: isDragging ? 0.35 : 1,
                          boxShadow: dropAbove ? "inset 0 2px 0 var(--fi-accent-strong)" : undefined,
                        }}>
                        <td style={{ padding: 0, textAlign: "center", color: "var(--lyra-slate-400)", cursor: "grab" }}>
                          <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
                            <circle cx="9" cy="6" r="1.3"/><circle cx="15" cy="6" r="1.3"/>
                            <circle cx="9" cy="12" r="1.3"/><circle cx="15" cy="12" r="1.3"/>
                            <circle cx="9" cy="18" r="1.3"/><circle cx="15" cy="18" r="1.3"/>
                          </svg>
                        </td>
                        <td>
                          <div style={{
                            display: "inline-flex", alignItems: "center", justifyContent: "center",
                            minWidth: 28, height: 24, padding: "0 var(--space-2)", borderRadius: 6,
                            background: "var(--color-bg-active-moderate)",
                            color: "var(--color-fg-active-strong)",
                            font: "600 14px/20px var(--font-sans)",
                          }}>
                            {idx + 1}
                          </div>
                        </td>
                        <td>
                          <div style={{ font: "500 14px/20px var(--font-sans)", color: "var(--color-fg-default)" }}>{c.name}</div>
                        </td>
                        <td style={{ whiteSpace: "nowrap", font: "400 13px/20px var(--font-sans)", color: "var(--color-fg-default)" }}>
                          {c.channels.map(k => k === "voice" ? "Voice" : "Digital").join(", ")}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <div className="ly-modal-foot">
              <button className="btn" onClick={() => setPriorityModalOpen(false)}>Cancel</button>
              <button className="btn primary" onClick={handleSaveModal}>Save priority</button>
            </div>
          </div>
        </div>,
        document.body
      )}
    </div>
  );
}

function Segmented({ options, value, onChange, disabled = [] }) {
  return (
    <div className="seg">
      {options.map(o => (
        <button key={o} className={value === o ? "on" : ""} disabled={disabled.includes(o)} onClick={() => onChange(o)}>{o}</button>
      ))}
    </div>

}

function Toggle({ checked, onChange, label }) {
  return (
    <label className="switch-row">
      <span className="switch">
        <input type="checkbox" checked={checked} onChange={e => onChange(e.target.checked)}/>
        <span className="slider"/>
      </span>
      {label ? <span>{label}</span> : null}
    </label>
  );
}

function ChipWell({ values, onChange, placeholder, brand }) {
  const [draft, setDraft] = React.useState("");
  function addChip(v) {
    v = v.trim();
    if (!v) return;
    if (values.includes(v)) return;
    onChange([...values, v]);
    setDraft("");
  }
  return (
    <div className="chip-well">
      {values.map(v => (
        <span key={v} className={`chip ${brand ? "brand" : ""}`}>
          {v}
          <span className="x" onClick={() => onChange(values.filter(x => x !== v))}>
            <svg viewBox="0 0 16 16" width="10" height="10"><line x1="4" y1="4" x2="12" y2="12" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/><line x1="12" y1="4" x2="4" y2="12" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></svg>
          </span>
        </span>
      ))}
      <input
        placeholder={placeholder}
        value={draft}
        onChange={e => setDraft(e.target.value)}
        onKeyDown={e => { if (e.key === "Enter" || e.key === ",") { e.preventDefault(); addChip(draft); } }}
        onBlur={() => addChip(draft)}
      />
    </div>
  );
}

function MultiSelectField({ options, value = [], onChange, placeholder = "Select...", error = false }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef();
  React.useEffect(() => {
    if (!open) return;
    function onDown(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener("mousedown", onDown);
    return () => document.removeEventListener("mousedown", onDown);
  }, [open]);
  const toggle = (opt) => onChange(value.includes(opt) ? value.filter(v => v !== opt) : [...value, opt]);
  const label = value.length === 0 ? <span style={{ color: "var(--color-fg-secondary)" }}>{placeholder}</span>
    : value.length === 1 ? value[0]
    : `${value.length} selected`;
  return (
    <div ref={ref} style={{ position: "relative" }}>
      <button type="button"
        className={`fi-input${error ? " error" : ""}`}
        style={{ display: "flex", alignItems: "center", justifyContent: "space-between", textAlign: "left", cursor: "pointer", width: "100%", background: "var(--lyra-white)" }}
        onClick={() => setOpen(o => !o)}>
        <span style={{ flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{label}</span>
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"
          style={{ flexShrink: 0, marginLeft: 6, transform: open ? "rotate(180deg)" : "none", transition: "transform 0.15s" }}>
          <polyline points="4 6 8 10 12 6"/>
        </svg>
      </button>
      {value.length > 0 && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: "var(--space-1)", marginTop: "var(--space-2)" }}>
          {value.map(v => (
            <span key={v} style={{ display: "inline-flex", alignItems: "center", gap: 4, padding: "2px var(--space-2)", borderRadius: "var(--radius-round)", background: "var(--color-bg-active-moderate)", color: "var(--color-fg-active-strong)", font: "500 12px/16px var(--font-sans)" }}>
              {v}
              <button type="button" onClick={() => toggle(v)} style={{ background: "none", border: "none", cursor: "pointer", padding: 0, lineHeight: 1, color: "inherit", display: "flex", alignItems: "center" }}>
                <svg viewBox="0 0 12 12" width="10" height="10" stroke="currentColor" fill="none" strokeWidth="1.8" strokeLinecap="round"><line x1="9" y1="3" x2="3" y2="9"/><line x1="3" y1="3" x2="9" y2="9"/></svg>
              </button>
            </span>
          ))}
        </div>
      )}
      {open && (
        <div style={{ position: "absolute", top: "calc(100% + 4px)", left: 0, right: 0, zIndex: 200, background: "var(--lyra-white)", border: "1px solid var(--color-border-soft)", borderRadius: "var(--radius-md)", boxShadow: "0px 4px 8px 0px rgba(0,0,0,0.08)", overflow: "hidden" }}>

            <label key={opt} style={{ display: "flex", alignItems: "center", gap: "var(--space-3)", padding: "var(--space-2) var(--space-3)", cursor: "pointer", font: "400 14px/20px var(--font-sans)", color: "var(--color-fg-default)", background: value.includes(opt) ? "var(--color-bg-active-subtle)" : "transparent" }}>
              <input type="checkbox" checked={value.includes(opt)} onChange={() => toggle(opt)} style={{ accentColor: "var(--lyra-brand-600)", flexShrink: 0 }}/>
              {opt}
            </label>
          ))}
        </div>
      )}
    </div>
  );
}

function FiDatePicker({ value, onChange, disabled, placeholder = "Select date", error }) {
  const ref = React.useRef(null);
  const fmt = (iso) => {
    if (!iso) return "";
    const [y, m, d] = iso.split("-").map(Number);
    if (!y || !m || !d) return "";
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return `${months[m-1]} ${String(d).padStart(2,"0")}, ${y}`;
  };
  return (
    <div style={{ position: "relative", flex: 1, minWidth: 160 }}>
      <input
        type="text"
        readOnly
        className={`fi-input${error ? " fi-input--error" : ""}`}
        placeholder={placeholder}
        disabled={disabled}
        value={fmt(value)}
        onClick={() => !disabled && (ref.current?.showPicker ? ref.current.showPicker() : ref.current?.focus())}
        style={{ cursor: disabled ? "not-allowed" : "pointer", paddingRight: 36 }}
      />
      <svg viewBox="0 0 24 24" width="14" height="14"
        style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)",
          color: disabled ? "var(--lyra-slate-300)" : "var(--lyra-slate-500)", pointerEvents: "none" }}
        stroke="currentColor" fill="none" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round">
        <rect x="3" y="5" width="18" height="16" rx="2"/>
        <line x1="3" y1="9" x2="21" y2="9"/>
        <line x1="8" y1="3" x2="8" y2="7"/>
        <line x1="16" y1="3" x2="16" y2="7"/>
      </svg>
      <input
        ref={ref}
        type="date"
        value={value || ""}
        disabled={disabled}
        onChange={e => onChange(e.target.value)}
        style={{
          position: "absolute", inset: 0, opacity: 0, pointerEvents: "none",
          width: "100%", height: "100%", border: 0,
        }}
      />
    </div>
  );
}

function CreateCampaign({ template: initialTemplate, editCampaign, onCancel, onSave }) {
  const [selectedTemplate, setSelectedTemplate] = React.useState(initialTemplate || null);
  const [drawerOpen, setDrawerOpen] = React.useState(false);
  const [modelDrawerOpen, setModelDrawerOpen] = React.useState(false);
  const [surveyDrawerOpen, setSurveyDrawerOpen] = React.useState(false);
  const [c, setC] = React.useState(() =>
    editCampaign
      ? { ...DEFAULT_CAMPAIGN, ...editCampaign }
      : initialTemplate
        ? { ...DEFAULT_CAMPAIGN, channels: initialTemplate.channels || DEFAULT_CAMPAIGN.channels }
        : DEFAULT_CAMPAIGN
  );
  const [activeStep, setActiveStep] = React.useState(0);
  const [visitedSteps, setVisitedSteps] = React.useState(new Set());
  const [reviewing, setReviewing] = React.useState(false);
  const set = (k, v) => setC(prev => ({ ...prev, [k]: v }));

  function pickTemplate(t) {
    setSelectedTemplate(t);
    setDrawerOpen(false);
    set("channels", t.channels || DEFAULT_CAMPAIGN.channels);
  }

  function goScratch() {
    setSelectedTemplate(null);
    setDrawerOpen(false);
  }

  const ALL_STEPS = [
    { n: 0, label: "Campaign, Identity & Scope",   done: !!c.name },
    { n: 1, label: "Suppression Rules",     done: true },
    { n: 2, label: "Topic AI Model & Survey Template", done: !!c.aiModelId && !!c.surveyDesignId },
    { n: 3, label: "Summary & Review",      done: false },
  ];

  const [triedSteps, setTriedSteps] = React.useState(new Set());
  const [activating, setActivating] = React.useState(false);

  function handleActivate() {
    setActivating(true);
    setTimeout(() => { onSave({ ...c, status: "active" }); }, 2500);
  }

  function stepState(s) {
    if (s.n === activeStep) return "active";
    if (visitedSteps.has(s.n)) return "done";
    return "default";
  }

  function goNext() {
    setTriedSteps(prev => new Set([...prev, activeStep]));
    setVisitedSteps(prev => new Set([...prev, activeStep]));
    setActiveStep(prev => Math.min(prev + 1, 4));
  }

  function goBack() {
    setActiveStep(prev => Math.max(prev - 1, 0));
  }

  if (reviewing) {
    const SummarySection = ({ title, children }) => (
      <div style={{ background: "var(--lyra-white)", border: "1px solid var(--color-border-subtle)", borderRadius: "var(--radius-lg)", overflow: "hidden", marginBottom: "var(--space-3)" }}>
        <div style={{ padding: "var(--space-2) var(--space-4)", background: "var(--lyra-slate-50)", borderBottom: "1px solid var(--color-border-subtle)", font: "500 11px/16px var(--font-sans)", color: "var(--color-fg-secondary)", letterSpacing: "0.06em", textTransform: "uppercase" }}>
          {title}
        </div>
        <div style={{ padding: "0 var(--space-4)" }}>{children}</div>
      </div>
    );
    const SRow = ({ label, value }) => (
      <div style={{ display: "flex", alignItems: "flex-start", gap: "var(--space-4)", padding: "var(--space-2) 0", borderBottom: "1px solid var(--color-border-subtle)" }}>
        <span style={{ font: "500 13px/20px var(--font-sans)", color: "var(--color-fg-secondary)", minWidth: 200, flexShrink: 0 }}>{label}</span>
        <span style={{ font: "400 13px/20px var(--font-sans)", color: "var(--color-fg-default)" }}>{value ?? "—"}</span>
      </div>
    );
    return (
      <div className="pane" style={{ overflow: "hidden" }}>
        <div className="crumbs">
          <a href="#" onClick={e => { e.preventDefault(); onCancel(); }}>Feedback Intelligence</a>
          <span className="sep">/</span>
          <a href="#" onClick={e => { e.preventDefault(); onCancel(); }}>Survey Campaigns</a>
          <span className="sep">/</span>
          <a href="#" onClick={e => { e.preventDefault(); setReviewing(false); }}>Create Campaign</a>
          <span className="sep">/</span>
          <span className="last">Review &amp; Activate</span>
        </div>
        <div className="pane-head" style={{ paddingTop: 6 }}>
          <div style={{ flex: 1 }}>
            <h1>Review &amp; Activate</h1>
            <p style={{ margin: "var(--space-1) 0 0", font: "400 13px/20px var(--font-sans)", color: "var(--color-fg-secondary)" }}>
              Confirm your campaign settings before it goes live.
            </p>
          </div>
          <div className="head-actions">
            <button className="btn" onClick={() => setReviewing(false)}>← Back to edit</button>
            <button className="btn" onClick={() => onSave({ ...c, status: "draft" })}>Save as draft</button>
            <button className="btn primary" onClick={() => onSave({ ...c, status: "active" })}>
              Activate Campaign →
            </button>
          </div>
        </div>
        <div style={{ padding: "var(--space-5) var(--space-6)", overflow: "auto", flex: 1 }}>
          <div style={{ maxWidth: 680 }}>
            {selectedTemplate && (
              <div style={{ display: "flex", alignItems: "center", gap: "var(--space-3)", padding: "var(--space-2) var(--space-4)", background: "var(--color-bg-active-subtle)", border: "1px solid var(--lyra-brand-200)", borderRadius: "var(--radius-md)", marginBottom: "var(--space-4)", font: "400 13px/20px var(--font-sans)", color: "var(--lyra-brand-700)" }}>
                <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" strokeWidth="1.8"><rect x="4" y="3" width="16" height="18" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="13" y2="16"/></svg>
                <strong>Template:</strong>&nbsp;{selectedTemplate.name}
              </div>
            )}
            <SummarySection title="Campaign Identity">
              <SRow label="Campaign Name" value={c.name}/>
              <SRow label="Description" value={c.description || null}/>
              <SRow label="Start Date" value={c.startDate}/>
              <SRow label="End Date" value={c.ongoing ? "Ongoing" : (c.endDate || null)}/>
              <SRow label="Teams" value={(c.queues || []).join(", ") || "Not set"}/>
              <SRow label="Groups" value={(c.teams || []).join(", ") || "All groups"}/>
              <SRow label="Language" value="English (Default)"/>
            </SummarySection>
            <SummarySection title="Suppression Rules">
              <SRow label="Opt-out suppression" value={c.suppressOptOut ? "Enabled" : "Disabled"}/>
              <SRow label="Recency window" value={c.suppressRecent ? `${c.recentDays} days` : "Disabled"}/>
              <SRow label="Internal interactions" value="Always suppressed"/>
            </SummarySection>
            <SummarySection title="Trigger Rules">
              <SRow label="Trigger event" value={c.triggerEvent}/>
              <SRow label="Delay" value={c.delay === "Immediate" ? "Immediate" : `${c.delayValue || 5} ${c.delay.toLowerCase()} after end`}/>
            </SummarySection>
            <div style={{ display: "flex", justifyContent: "flex-end", gap: "var(--space-2)", paddingTop: "var(--space-2)" }}>
              <button className="btn" onClick={() => setReviewing(false)}>← Back to edit</button>
              <button className="btn" onClick={() => onSave({ ...c, status: "draft" })}>Save as draft</button>
              <button className="btn primary" onClick={() => onSave({ ...c, status: "active" })}>
                Activate Campaign →
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  const datesValid  = !!(c.startDate && (c.ongoing || c.endDate));
  const canDraft    = !!(c.name && datesValid);
  const canActivate = !!(c.name && c.queues?.length && datesValid);

  return (
    <div className="pane" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <div className="crumbs">
        <a href="#" onClick={e => { e.preventDefault(); onCancel(); }}>Survey Campaigns</a>
        <span className="sep">/</span>
        <span className="last">{editCampaign ? editCampaign.name : "Create New Survey Campaign"}</span>
      </div>

      <div className="pane-head" style={{ paddingTop: 6 }}>
        <h1>{editCampaign ? editCampaign.name : "Create New Survey Campaign"}</h1>
      </div>

      {/* ── Meta bar — only shown when editing an existing campaign ── */}
      {editCampaign && (
        <div style={{
          display: "flex", alignItems: "center", gap: "var(--space-3)",
          padding: "var(--space-3) var(--space-8)",
          background: "var(--color-bg-surface-shell, #f5f7f9)",
          borderBottom: "1px solid var(--color-border-subtle)",
        }}>
          <div style={{ flex: 1, font: "400 14px/20px var(--font-sans)", color: "var(--color-fg-secondary)" }}>
            <strong style={{ color: "var(--color-fg-default)", fontWeight: 500 }}>Owner:</strong> {editCampaign.owner}
            <span style={{ margin: "0 var(--space-2)" }}>•</span>
            <strong style={{ color: "var(--color-fg-default)", fontWeight: 500 }}>Created:</strong> {editCampaign.created}
            <span style={{ margin: "0 var(--space-2)" }}>•</span>
            <strong style={{ color: "var(--color-fg-default)", fontWeight: 500 }}>Last Updated:</strong> {editCampaign.updated}
            {editCampaign.status !== "expired" && (
              <>
                <span style={{ margin: "0 var(--space-2)" }}>•</span>
                <CampaignStateInline status={editCampaign.status} hasWorkingCopy={editCampaign.hasWorkingCopy}/>
              </>
            )}
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: "var(--space-2)" }}>
            <span style={{ font: "500 12px/16px var(--font-sans)", color: "var(--color-fg-secondary)" }}>Campaign Status</span>
            <StatusPill s={editCampaign.status}/>
          </div>
        </div>
      )}

      {/* ── Horizontal Wizard Bar ── */}
      <div className="wz-bar">
        <div className="wz-bar-inner">
          {ALL_STEPS.map((s, i) => {
            const st = stepState(s);
            const prevDone = i > 0 && stepState(ALL_STEPS[i - 1]) === "done";
            return (
              <React.Fragment key={s.n}>
                {i > 0 && <div className={`wz-line ${prevDone ? "done" : ""}`}/>}
                <div className={`wz-step ${st}`} onClick={() => setActiveStep(s.n)}>
                  <div className="wz-node">
                    {st === "done" ? (
                      <svg viewBox="0 0 12 12" width="10" height="10" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="2 6 5 9.5 10 2.5"/></svg>
                    ) : s.n + 1}
                  </div>
                  <div className="wz-label">{s.label}</div>
                </div>
              </React.Fragment>
            );
          })}
        </div>
      </div>

      {/* ── Wizard body: scrollable area + footer ── */}
      <div className="wz-scroll-area">
        <div className="wz-body">
          <div className="form-pane">

          {/* ── Step 0: Template, Identity &amp; Scope ── */}
          {activeStep === 0 && (()=>{
            const showErr      = triedSteps.has(0);
            const nameErr      = showErr && !c.name;
            const teamsErr     = showErr && !c.queues?.[0];
            const startDateErr = showErr && !c.startDate;
            const endDateErr   = showErr && !c.ongoing && !c.endDate;
            return <div className="wz-step-content">

              <div className="wz-step-head">
                <h2>Campaign, Identity &amp; Scope</h2>
                <p>Name the campaign, set its active dates, and choose the teams and interactions it should target.</p>
              </div>

              {/* ── Campaign Identity ── */}
              <div className="setup-section">
                <div className="setup-section-body">
                <div className="field-grid-2">
                  <div className="field-cell">
                    <label className="field-label">Campaign Name<span className="req">*</span><span className="char-counter">{(c.name || "").length}/50</span></label>
                    <input className={`fi-input${nameErr ? " error" : ""}`} placeholder="Type" maxLength={50}
                      aria-invalid={nameErr || undefined}
                      value={c.name} onChange={e => set("name", e.target.value)}/>
                    {nameErr && <div className="field-control"><span className="error-msg">
                      <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><circle cx="8" cy="8" r="6"/><line x1="8" y1="5" x2="8" y2="8.5"/><circle cx="8" cy="11" r=".6" fill="currentColor"/></svg>
                      Campaign name is required
                    </span></div>}
                  </div>
                  <div className="field-cell">
                    <label className="field-label">
                      Description
                      <span className="char-counter">{(c.description || "").length}/200</span>
                    </label>
                    <input className="fi-input" maxLength={200} placeholder="Type"
                      value={c.description} onChange={e => set("description", e.target.value)}/>
                  </div>
                </div>

                <div style={{ padding: "var(--space-6) 0" }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "var(--space-3)" }}>
                    <div className="section-heading" style={{ padding: 0 }}>Active Date Range</div>
                    <label style={{ display: "flex", alignItems: "center", gap: "var(--space-2)", font: "400 13px/20px var(--font-sans)", color: "var(--color-fg-secondary)", cursor: "pointer" }}>
                      <Toggle checked={c.ongoing} onChange={v => set("ongoing", v)}/>
                      <span>Ongoing</span>
                    </label>
                  </div>
                  <div className="field-grid-2" style={{ padding: 0, borderTop: 0 }}>
                    <div className="field-cell">
                      <label className="field-label" style={{ fontWeight: 400 }}>Start Date<span className="req">*</span></label>
                      <FiDatePicker value={c.startDate} onChange={v => set("startDate", v)} placeholder="Oct 30, 2025" error={startDateErr}/>
                      {startDateErr && <span className="error-msg" style={{ marginTop: "var(--space-1)", display: "flex", alignItems: "center", gap: 4 }}>
                        <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><circle cx="8" cy="8" r="6"/><line x1="8" y1="5" x2="8" y2="8.5"/><circle cx="8" cy="11" r=".6" fill="currentColor"/></svg>
                        Start date is required
                      </span>}
                    </div>
                    <div className="field-cell">
                      <label className="field-label" style={{ fontWeight: 400, color: c.ongoing ? "var(--color-fg-disabled)" : undefined }}>End Date{!c.ongoing && <span className="req">*</span>}</label>
                      <FiDatePicker value={c.endDate} onChange={v => set("endDate", v)} disabled={c.ongoing} placeholder={c.ongoing ? "Ongoing" : "Oct 30, 2025"} error={endDateErr}/>
                      {endDateErr && <span className="error-msg" style={{ marginTop: "var(--space-1)", display: "flex", alignItems: "center", gap: 4 }}>
                        <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><circle cx="8" cy="8" r="6"/><line x1="8" y1="5" x2="8" y2="8.5"/><circle cx="8" cy="11" r=".6" fill="currentColor"/></svg>
                        End date is required
                      </span>}
                    </div>
                  </div>
                </div>

                <div className="section-heading" style={{ paddingTop: "var(--space-6)", paddingBottom: "var(--space-2)" }}>Agents</div>
                <div className="field-grid-2" style={{ borderTop: "none", paddingTop: 0, paddingBottom: 0 }}>
                  <div className="field-cell">
                    <label className="field-label">Teams<span className="req">*</span></label>
                    <MultiSelectField
                      options={["Tier 1 Billing", "Tier 2 Support", "Sales", "Retention"]}
                      value={c.queues || []}
                      onChange={v => set("queues", v)}
                      placeholder="Select Teams"
                      error={teamsErr}
                    />
                    {teamsErr && <div className="field-control"><span className="error-msg">
                      <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><circle cx="8" cy="8" r="6"/><line x1="8" y1="5" x2="8" y2="8.5"/><circle cx="8" cy="11" r=".6" fill="currentColor"/></svg>

                      value={c.teams || []}
                      onChange={v => set("teams", v)}
                      placeholder="Select Group"

                    <label className="lyra-check disabled" style={{ pointerEvents: "none" }}>
                      <input type="checkbox" checked readOnly disabled/>
                      <span>English (Default)</span>
                    </label>
                  </FieldRow>
                </div>

                <div style={{ paddingTop: "var(--space-6)" }}>
                  <FieldRow label="Interaction Length">
                    <div style={{ display: "flex", alignItems: "center", gap: 8, width: "50%" }}>

                      <input type="number" className="fi-input" min={1} value={c.interactionLength ?? 2} onChange={e => set("interactionLength", parseInt(e.target.value) || 1)} style={{ width: 72, textAlign: "center", flexShrink: 0 }}/>
                      <span style={{ color: "var(--color-fg-secondary)", fontSize: 13, flexShrink: 0 }}>mins</span>
                    </div>
                    <div className="field-hint" style={{ marginTop: 6 }}>Only send survey if the interaction lasted at least this long.</div>
                  </FieldRow>
                </div>
                </div>{/* /setup-section-body */}
              </div>

            </div>;
          })()}

          {/* ── Step 1: Suppression Rules ── */}
          {activeStep === 1 && (
            <div className="wz-step-content">
              <div className="wz-content-card">
              <div className="wz-step-head">
                <h2>Suppression Rules</h2>
                <p>When not to send surveys, even if everything else qualifies.</p>
              </div>
              <div className="sup-row">
                <Toggle checked={c.suppressOptOut} onChange={v => set("suppressOptOut", v)}/>
                <div className="meta">
                  <div className="title">
                    Opt-Out Tag
                    <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" strokeWidth="1.8" style={{ marginLeft: 4, color: "var(--color-fg-secondary)" }}><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 0 1 5 .5c0 1.5-2 2.2-2.5 3.2"/><circle cx="12" cy="16.5" r=".6" fill="currentColor"/></svg>
                  </div>
                  <div className="ex">Skip any customer flagged as opted out. Sending anyway destroys trust and risks compliance.</div>
                </div>
              </div>
              <div className="sup-row">
                <Toggle checked={c.suppressRecent} onChange={v => set("suppressRecent", v)}/>
                <div className="meta">
                  <div className="title">
                    Recency window

                  </div>
                  <div className="ex" style={{ marginTop: 6 }}>Don't send if the same customer was surveyed within (X Days)</div>
                  <div className="inline-row" style={{ marginTop: 8, maxWidth: "50%" }}>
                    <input type="number" className="fi-input"
                      value={c.recentDays} onChange={e => set("recentDays", parseInt(e.target.value || 0))}
                      disabled={!c.suppressRecent}/>
                    <span style={{ color: "var(--color-fg-secondary)", fontSize: 14, lineHeight: "20px", flexShrink: 0 }}>Days</span>
                  </div>
                </div>
              </div>
              <div className="sup-row">
                <Toggle checked={true} onChange={() => {}}/>
                <div className="meta">
                  <div className="title">

                  </div>
                  <div className="ex">Suppress interactions flagged as internal or test. Hard-coded — QA agents testing IVR flows never generate customer surveys.</div>
                </div>
              </div>
              </div>
            </div>
          )}


          {/* ── Step 2: Topic AI Model & Survey Template ── */}
          {activeStep === 2 && (
            <div className="wz-step-content">
              <div className="wz-content-card">
              <div className="wz-step-head">
                <h2>Topic AI Model &amp; Survey Template</h2>
                <p>Choose the AI model and survey design for this campaign.</p>
              </div>
              <div className="intel-sub-section">
                {(() => {
                  const activeModel = AI_MODELS.find(m => m.id === c.aiModelId);
                  if (!activeModel) return (
                    <header className="form-section-head no-border" style={{ cursor: "default" }}>
                      <span className="step-num" style={{ display: "flex", fontSize: 0 }}>
                        <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.42 1.42M11.53 11.53l1.42 1.42M3.05 12.95l1.42-1.42M11.53 4.47l1.42-1.42"/></svg>
                      </span>
                      <div style={{ flex: 1 }}><h3>Topic AI Model</h3><div className="sub">Select an AI model to power your campaign intelligence</div></div>
                      <button className="btn" onClick={() => setModelDrawerOpen(true)}>Choose Topic AI Model →</button>
                    </header>

                  return (
                    <div className="selected-model-summary">
                      <div className="selected-model-summary-inner">

                          <div style={{ display: "flex", alignItems: "center", gap: "var(--space-2)", marginBottom: "var(--space-3)" }}>
